<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลังสินค้า</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B5EFB;
            --primary-dark: #2C48DE;
            --primary-light: #EEF1FF;
            --bg: #F3F5FB;
            --card: #FFFFFF;
            --text: #1E2233;
            --text-muted: #8A8FA3;
            --border: #E7E9F3;
            --success-bg: #E4F7EC;
            --success-text: #1A8A4E;
            --danger: #F04452;
            --danger-bg: #FDECEE;
            --danger-text: #D2313D;
            --warn-bg: #FFF3D6;
            --warn-text: #9A6A00;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
            background: var(--bg);
            padding: 28px 20px;
            color: var(--text);
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 1px 3px rgba(30, 34, 51, 0.04), 0 12px 32px -12px rgba(30, 34, 51, 0.10);
            display: flex;
            align-items: stretch;
        }
        .sidebar {
            width: 236px;
            flex-shrink: 0;
            background: var(--bg);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            border-radius: 20px 0 0 20px;
            position: sticky;
            top: 0;
            align-self: flex-start;
            max-height: 100vh;
            overflow-y: auto;
        }
        .main-content { flex: 1; min-width: 0; padding: 28px 32px; }
        .app-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; padding: 0 6px; }
        .app-header .logo-badge {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #6B8CFF);
            display: flex; align-items: center; justify-content: center;
            color: white; flex-shrink: 0;
            box-shadow: 0 8px 16px -6px rgba(59, 94, 251, 0.45);
        }
        h1 { color: var(--text); font-size: 17px; font-weight: 700; line-height: 1.25; }
        .app-header .app-subtitle { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
        h2 { color: var(--text); margin: 4px 0 18px 0; font-size: 18px; font-weight: 600; }
        h3 { color: var(--text); font-size: 15px; font-weight: 600; }
        .nav-tabs {
            display: flex; flex-direction: column; gap: 2px;
        }
        .nav-tab {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; cursor: pointer; background: none; color: var(--text-muted);
            border: none; border-radius: 10px; font-size: 13.5px; font-weight: 500;
            font-family: inherit; transition: background 0.15s, color 0.15s;
            width: 100%; text-align: left;
        }
        .nav-tab:hover { color: var(--text); background: var(--border); }
        .nav-tab.active { background: var(--card); color: var(--primary); font-weight: 600; box-shadow: 0 2px 8px rgba(30,34,51,0.08); }
        .nav-tab svg { flex-shrink: 0; }
        @media (max-width: 760px) {
            .container { flex-direction: column; }
            .sidebar {
                width: 100%; border-right: none; border-bottom: 1px solid var(--border);
                border-radius: 20px 20px 0 0; position: static; max-height: none;
            }
            .nav-tabs { flex-direction: row; flex-wrap: wrap; }
            .nav-tab { width: auto; }
            .main-content { padding: 22px 18px; }
        }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-box {
            background: var(--card); padding: 18px 18px 16px; border-radius: var(--radius);
            border: 1px solid var(--border); position: relative;
        }
        .stat-box .stat-icon {
            width: 34px; height: 34px; border-radius: 10px; background: var(--primary-light);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.1; }
        .stat-label { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text); font-size: 13.5px; }
        input, select, textarea {
            width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
            background: var(--card); color: var(--text); font-size: 14px; font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light);
        }
        button {
            padding: 10px 20px; background: var(--primary); color: white; border: none;
            border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
            font-family: inherit; transition: background 0.15s, transform 0.05s;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: translateY(1px); }
        button.secondary { background: var(--bg); color: var(--text); }
        button.secondary:hover { background: var(--border); }
        button.danger { background: var(--danger-bg); color: var(--danger-text); }
        button.danger:hover { background: var(--danger); color: white; }
        button.small { padding: 7px 13px; font-size: 12.5px; border-radius: 8px; }
        .alert {
            padding: 12px 16px; margin-bottom: 16px; border-radius: 12px; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-error { background: var(--danger-bg); color: var(--danger-text); }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { background: var(--bg); color: var(--text-muted); padding: 11px 12px; text-align: left; font-weight: 600; font-size: 12.5px; }
        th:first-child { border-radius: 8px 0 0 8px; }
        th:last-child { border-radius: 0 8px 8px 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card {
            padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 12px; transition: box-shadow 0.15s;
        }
        .card:hover { box-shadow: 0 4px 14px -6px rgba(30,34,51,0.10); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
        .badge-in { background: var(--success-bg); color: var(--success-text); }
        .badge-out { background: var(--danger-bg); color: var(--danger-text); }
        .badge-adj { background: var(--warn-bg); color: var(--warn-text); }
        .row-actions { display: flex; gap: 8px; margin-top: 10px; }
        .loc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .loc-tag { display: inline-block; background: var(--primary-light); color: var(--primary-dark); padding: 4px 11px; border-radius: 999px; font-size: 11.5px; font-weight: 500; }
        .search-results { border: 1px solid var(--border); border-radius: 10px; margin-top: 6px; max-height: 170px; overflow-y: auto; box-shadow: 0 8px 20px -8px rgba(30,34,51,0.15); }
        .search-result-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13.5px; }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--primary-light); }
        @media print {
            @page { size: A4; margin: 15mm; }
            body * { visibility: hidden; }
            .print-area, .print-area * { visibility: visible; }
            .print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;
        const supabaseUrl = 'https://fimdhwhaabryezgramxa.supabase.co';
        const supabaseKey = 'sb_publishable_vHRKOExvoBPhBqLMyjM0LA_gTal-mBU';
        const client = createClient(supabaseUrl, supabaseKey);

        const MOVEMENT_LABELS = {
            receiving: 'รับเข้า',
            sale: 'ขายหน้าร้าน',
            transfer: 'โอนสาขา',
            adjustment: 'ปรับปรุง'
        };

        const formatUnit = (product) => {
            if (!product) return '';
            if (product.pack_unit && product.pack_size) return product.pack_unit + '(' + product.pack_size + (product.unit || '') + ')';
            return product.unit || '';
        };

        const daysUntil = (dateStr) => {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr + 'T00:00:00');
            return Math.round((target - today) / 86400000);
        };

        const iconProps = { xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 24 24', width: 18, height: 18, fill: 'none', stroke: 'currentColor', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round' };
        const IconHome = () => (<svg {...iconProps}><path d="M3.5 11.5L12 4l8.5 7.5" /><path d="M5.5 10v9.5h13V10" /><path d="M9.5 19.5V14h5v5.5" /></svg>);
        const IconIn = () => (<svg {...iconProps}><rect x="4" y="4" width="16" height="16" rx="4" /><path d="M12 8.5v7M9 12.5l3 3 3-3" /></svg>);
        const IconOut = () => (<svg {...iconProps}><rect x="4" y="4" width="16" height="16" rx="4" /><path d="M12 15.5v-7M9 11.5l3-3 3 3" /></svg>);
        const IconBox = () => (<svg {...iconProps}><path d="M12 3.5l8 4v9l-8 4-8-4v-9l8-4z" /><path d="M4 7.5l8 4 8-4M12 11.5v9" /></svg>);
        const IconSwap = () => (<svg {...iconProps}><path d="M4 8h13.5M14.5 4.5L17.5 8l-3 3.5" /><path d="M20 16H6.5M9.5 12.5L6.5 16l3 3.5" /></svg>);
        const IconAlert = () => (<svg {...iconProps}><path d="M12 3.5l9 16h-18l9-16z" /><path d="M12 10v4" /><circle cx="12" cy="17" r="0.6" fill="currentColor" stroke="none" /></svg>);
        const IconHistory = () => (<svg {...iconProps}><circle cx="12" cy="12" r="8.5" /><path d="M12 7.5V12l3.2 2" /></svg>);
        const IconPin = () => (<svg {...iconProps}><path d="M12 21s6.5-6.2 6.5-11.2A6.5 6.5 0 105.5 9.8C5.5 14.8 12 21 12 21z" /><circle cx="12" cy="9.7" r="2.3" /></svg>);
        const IconUser = () => (<svg {...iconProps}><circle cx="12" cy="8.3" r="3.3" /><path d="M5 20c1-3.9 3.8-5.8 7-5.8s6 1.9 7 5.8" /></svg>);
        const IconCart = () => (<svg {...iconProps}><path d="M4 5h2l2 11h10l2-8H7" /><circle cx="10" cy="19" r="1.3" fill="currentColor" stroke="none" /><circle cx="17" cy="19" r="1.3" fill="currentColor" stroke="none" /></svg>);
        const IconTruck = () => (<svg {...iconProps}><rect x="2.5" y="7.5" width="11" height="9" rx="1.5" /><path d="M13.5 10.5h4l3 3.5v2.5h-7z" /><circle cx="7" cy="18.5" r="1.6" /><circle cx="16.5" cy="18.5" r="1.6" /></svg>);
        const IconChart = () => (<svg {...iconProps}><path d="M4 20V10M12 20V4M20 20v-7" /><path d="M2.5 20h19" /></svg>);
        const IconLogo = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.5l8 4v9l-8 4-8-4v-9l8-4z" /><path d="M4 7.5l8 4 8-4M12 11.5v9" /></svg>);

        function Home({ products, locations, stock, movements }) {
            const total = stock.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
            return (
                <div>
                    <div className="stats">
                        <div className="stat-box"><div className="stat-icon"><IconBox /></div><div className="stat-value">{products.length}</div><div className="stat-label">สินค้า</div></div>
                        <div className="stat-box"><div className="stat-icon"><IconPin /></div><div className="stat-value">{locations.length}</div><div className="stat-label">ที่อยู่</div></div>
                        <div className="stat-box"><div className="stat-icon"><IconIn /></div><div className="stat-value">{total.toFixed(0)}</div><div className="stat-label">จำนวน</div></div>
                        <div className="stat-box"><div className="stat-icon"><IconSwap /></div><div className="stat-value">{new Set(stock.map(s => s.location_id)).size}</div><div className="stat-label">ใช้งาน</div></div>
                    </div>
                    <h2>รายการล่าสุด</h2>
                    {movements.slice(0, 10).map(m => {
                        const p = products.find(x => x.id === m.product_id);
                        const l = locations.find(x => x.id === m.location_id);
                        const isOut = parseFloat(m.quantity_change) < 0;
                        return (
                            <div key={m.id} className="card" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <div>
                                    <span className={'badge ' + (m.movement_type === 'adjustment' ? 'badge-adj' : (isOut ? 'badge-out' : 'badge-in'))}>{MOVEMENT_LABELS[m.movement_type] || m.movement_type}</span>
                                    <strong style={{marginLeft: '8px'}}>{p ? p.product_code + ' - ' + p.name : '-'}</strong>
                                    <div style={{fontSize: '12px', color: '#666'}}>📍 {l ? l.name : '-'}</div>
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <div style={{fontWeight: 'bold', color: isOut ? '#721c24' : '#155724'}}>{isOut ? '' : '+'}{m.quantity_change}</div>
                                    <div style={{fontSize: '11px', color: '#999'}}>{new Date(m.created_at).toLocaleString('th-TH')}</div>
                                </div>
                            </div>
                        );
                    })}
                    {movements.length === 0 && <div style={{color: '#999'}}>ยังไม่มีรายการ</div>}
                </div>
            );
        }

        const genReceiptNo = () => {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return 'PR' + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds()) + Math.floor(Math.random() * 90 + 10);
        };

        const PACK_UNITS = ['ลัง', 'กล่อง', 'แพ็ค', 'มัด', 'กระสอบ', 'ถัง'];
        const BASE_UNITS = ['ชิ้น', 'ขวด', 'ซอง', 'ถุง', 'กระป๋อง', 'หลอด', 'อัน', 'กก.', 'ลิตร'];

        function UnitInput({ value, onChange, options, placeholder }) {
            const isPreset = value === '' || options.includes(value);
            const [customMode, setCustomMode] = useState(!isPreset);
            if (customMode) {
                return (
                    <div style={{display: 'flex', gap: '6px'}}>
                        <input type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} style={{flex: 1}} />
                        <button type="button" className="secondary small" onClick={() => { setCustomMode(false); onChange(''); }}>เลือกจากรายการ</button>
                    </div>
                );
            }
            return (
                <select value={value} onChange={(e) => { if (e.target.value === '__custom__') { setCustomMode(true); onChange(''); } else { onChange(e.target.value); } }}>
                    <option value="">{placeholder || '-- เลือกหน่วย --'}</option>
                    {options.map(o => (<option key={o} value={o}>{o}</option>))}
                    <option value="__custom__">อื่นๆ ระบุเอง...</option>
                </select>
            );
        }

        function ReceiptItemRow({ item, isAdmin, canEditCost, onRemove, locations, onUpdate }) {
            const totalBase = (parseFloat(item.packQty) || 0) * (parseFloat(item.packSize) || 1);
            const needsLocation = onUpdate && !item.locationId;
            return (
                <div style={{border: needsLocation ? '1.5px solid #e0a800' : '1px solid var(--border)', borderRadius: '10px', padding: '10px', marginBottom: '10px'}}>
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start'}}>
                        <div style={{flex: 1}}>
                            <strong>{item.productLabel}</strong>
                            {onUpdate ? (
                                <div className="grid-3" style={{marginTop: '8px'}}>
                                    <div className="form-group" style={{marginBottom: 0}}>
                                        <label>สถานที่จัดเก็บ{needsLocation ? ' (ยังไม่เลือก)' : ''}</label>
                                        <select value={item.locationId || ''} onChange={(e) => onUpdate({ locationId: e.target.value, locationLabel: (locations.find(l => l.id === e.target.value) || {}).name || '' })}>
                                            <option value="">-- เลือกสถานที่ --</option>
                                            {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                                        </select>
                                    </div>
                                    <div className="form-group" style={{marginBottom: 0}}>
                                        <label>จำนวนที่รับจริง ({item.packUnit || item.baseUnit || 'หน่วย'})</label>
                                        <input type="number" value={item.packQty} onChange={(e) => onUpdate({ packQty: e.target.value })} />
                                    </div>
                                    {(isAdmin || canEditCost) && (
                                        <div className="form-group" style={{marginBottom: 0}}>
                                            <label>ต้นทุน/หน่วย (บาท)</label>
                                            <input type="number" value={item.costPerBaseUnit} onChange={(e) => onUpdate({ costPerBaseUnit: e.target.value })} />
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '3px'}}>
                                    📍 {item.locationLabel} · {item.packQty || 0} {item.packUnit || item.baseUnit || 'หน่วย'} {item.packSize > 1 ? '× ' + item.packSize + ' = ' + totalBase.toFixed(0) + ' ' + (item.baseUnit || '') : ''}
                                </div>
                            )}
                            {item.packSize > 1 && <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px'}}>= {totalBase.toFixed(0)} {item.baseUnit || ''} เข้าสต็อก ({item.packQty || 0} {item.packUnit} × {item.packSize})</div>}
                            {item.lotNumber && <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '4px'}}>LOT: {item.lotNumber}{item.expiryDate ? ' · หมดอายุ ' + item.expiryDate : ''}</div>}
                            {!onUpdate && (isAdmin || canEditCost) && item.costPerBaseUnit !== '' && <div style={{fontSize: '12px', color: 'var(--text-muted)'}}>ต้นทุน/หน่วย: {item.costPerBaseUnit} บาท</div>}
                        </div>
                        {onRemove && <button className="small danger" onClick={onRemove}>ลบ</button>}
                    </div>
                </div>
            );
        }

        function ReceiptForm({ receiptId, products, locations, suppliers, staffName, isAdmin, flash, onDone, onCancel, seed }) {
            const [loading, setLoading] = useState(!!receiptId);
            const [supplierName, setSupplierName] = useState(seed?.supplierName || '');
            const [supplierRefNo, setSupplierRefNo] = useState(seed?.supplierRefNo || '');
            const [receiptDate, setReceiptDate] = useState(new Date().toISOString().slice(0, 10));
            const [notes, setNotes] = useState(seed?.notes || '');
            const [items, setItems] = useState(seed?.items || []);
            const [photos, setPhotos] = useState([]);
            const [saving, setSaving] = useState(false);

            const [search, setSearch] = useState('');
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [lid, setLid] = useState('');
            const [packUnit, setPackUnit] = useState('');
            const [packSize, setPackSize] = useState('1');
            const [packQty, setPackQty] = useState('');
            const [baseUnit, setBaseUnit] = useState('');
            const [cost, setCost] = useState('');
            const [wholesale, setWholesale] = useState('');
            const [retail, setRetail] = useState('');
            const [lotNumber, setLotNumber] = useState('');
            const [expiryDate, setExpiryDate] = useState('');
            const [itemFormKey, setItemFormKey] = useState(0);

            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const selectedProduct = products.find(p => p.id === pid);

            useEffect(() => {
                if (!pid) return;
                setBaseUnit(selectedProduct?.unit || '');
                if (selectedProduct?.pack_unit) setPackUnit(selectedProduct.pack_unit);
                if (selectedProduct?.pack_size) setPackSize(String(selectedProduct.pack_size));
            }, [pid]);

            useEffect(() => {
                if (!receiptId) return;
                (async () => {
                    const [{ data: r }, { data: its }, { data: phs }] = await Promise.all([
                        client.from('purchase_receipts').select('*').eq('id', receiptId).single(),
                        client.from('purchase_receipt_items').select('*').eq('receipt_id', receiptId),
                        client.from('purchase_receipt_photos').select('*').eq('receipt_id', receiptId)
                    ]);
                    if (r) {
                        setSupplierName(r.supplier_name || '');
                        setSupplierRefNo(r.supplier_ref_no || '');
                        setReceiptDate(r.receipt_date || new Date().toISOString().slice(0, 10));
                        setNotes(r.notes || '');
                    }
                    setItems((its || []).map(it => {
                        const p = products.find(x => x.id === it.product_id);
                        const l = locations.find(x => x.id === it.location_id);
                        return {
                            id: it.id, productId: it.product_id, productLabel: p ? p.product_code + ' - ' + p.name : '-',
                            locationId: it.location_id, locationLabel: l ? l.name : '-',
                            packUnit: it.pack_unit || '', packSize: it.pack_size, packQty: it.pack_qty,
                            baseUnit: it.base_unit || '', costPerBaseUnit: it.cost_per_base_unit ?? '',
                            lotNumber: it.lot_number || '', expiryDate: it.expiry_date || ''
                        };
                    }));
                    setPhotos((phs || []).map(ph => ({ id: ph.id, url: ph.photo_url })));
                    setLoading(false);
                })();
            }, [receiptId]);

            const addItem = () => {
                if (!pid || !lid || !packQty || parseFloat(packQty) <= 0) { flash('เลือกสินค้า ที่อยู่ และกรอกจำนวนให้ครบ'); return; }
                setItems([...items, {
                    productId: pid, productLabel: pLabel, locationId: lid, locationLabel: locations.find(l => l.id === lid)?.name || '-',
                    packUnit, packSize: parseFloat(packSize) || 1, packQty: parseFloat(packQty),
                    baseUnit, costPerBaseUnit: cost, wholesalePrice: wholesale, retailPrice: retail,
                    lotNumber, expiryDate
                }]);
                setItemFormKey(k => k + 1);
                setPid(''); setPLabel(''); setSearch(''); setLid(''); setPackUnit(''); setBaseUnit(''); setPackSize('1'); setPackQty('');
                setCost(''); setWholesale(''); setRetail(''); setLotNumber(''); setExpiryDate('');
            };

            const removeItem = (idx) => setItems(items.filter((_, i) => i !== idx));
            const updateItem = (idx, patch) => setItems(items.map((it, i) => i === idx ? { ...it, ...patch } : it));

            const handlePhotoFile = async (file) => {
                if (!file) return;
                try {
                    const ext = file.name.split('.').pop() || 'jpg';
                    const path = Date.now() + '_' + Math.floor(Math.random() * 10000) + '.' + ext;
                    const { error } = await client.storage.from('receipt-photos').upload(path, file);
                    if (error) throw error;
                    const { data } = client.storage.from('receipt-photos').getPublicUrl(path);
                    setPhotos([...photos, { url: data.publicUrl }]);
                } catch (err) {
                    flash('อัปโหลดรูปไม่สำเร็จ: ' + err.message, 'error');
                }
            };

            const removePhoto = (idx) => setPhotos(photos.filter((_, i) => i !== idx));

            const persist = async (status) => {
                if (!supplierName.trim()) { flash('กรอกชื่อผู้ส่ง/บริษัท'); return; }
                if (items.length === 0) { flash('เพิ่มรายการสินค้าอย่างน้อย 1 รายการ'); return; }
                if (items.some(it => !it.locationId)) { flash('กรุณาเลือกสถานที่จัดเก็บให้ครบทุกรายการก่อนบันทึก'); return; }
                setSaving(true);
                try {
                    if (!suppliers.some(s => s.name === supplierName.trim())) {
                        await client.from('suppliers').insert([{ name: supplierName.trim() }]).select().then(() => {}, () => {});
                    }
                    let rid = receiptId;
                    const header = { supplier_name: supplierName.trim(), supplier_ref_no: supplierRefNo.trim() || null, receipt_date: receiptDate, notes: notes.trim() || null };
                    if (rid) {
                        await client.from('purchase_receipts').update(header).eq('id', rid);
                        await client.from('purchase_receipt_items').delete().eq('receipt_id', rid);
                    } else {
                        const { data, error } = await client.from('purchase_receipts').insert([{ ...header, receipt_no: genReceiptNo(), status: 'draft', created_by: staffName }]).select('id').single();
                        if (error) throw error;
                        rid = data.id;
                    }
                    await client.from('purchase_receipt_items').insert(items.map(it => ({
                        receipt_id: rid, product_id: it.productId, location_id: it.locationId,
                        pack_unit: it.packUnit || null, pack_size: it.packSize, pack_qty: it.packQty,
                        base_unit: it.baseUnit || null, cost_per_base_unit: it.costPerBaseUnit === '' ? null : parseFloat(it.costPerBaseUnit),
                        lot_number: it.lotNumber || null, expiry_date: it.expiryDate || null
                    })));
                    const newPhotos = photos.filter(ph => !ph.id);
                    if (newPhotos.length > 0) {
                        await client.from('purchase_receipt_photos').insert(newPhotos.map(ph => ({ receipt_id: rid, photo_url: ph.url })));
                    }

                    if (status === 'finalized') {
                        for (const it of items) {
                            const totalQty = it.packQty * it.packSize;
                            const { data: existing } = await client.from('product_location_stock').select('*').eq('product_id', it.productId).eq('location_id', it.locationId).maybeSingle();
                            if (existing) {
                                await client.from('product_location_stock').update({ quantity: parseFloat(existing.quantity) + totalQty, updated_at: new Date().toISOString() }).eq('id', existing.id);
                            } else {
                                await client.from('product_location_stock').insert([{ product_id: it.productId, location_id: it.locationId, quantity: totalQty }]);
                            }
                            await client.from('stock_movements').insert([{ product_id: it.productId, location_id: it.locationId, quantity_change: totalQty, movement_type: 'receiving', notes: 'ใบรับสินค้า ' + (supplierRefNo || ''), staff_name: staffName }]);
                            if (it.lotNumber || it.expiryDate) {
                                await client.from('stock_lots').insert([{ product_id: it.productId, location_id: it.locationId, lot_number: it.lotNumber || null, expiry_date: it.expiryDate || null, quantity: totalQty, notes: 'รับเข้าจากใบ ' + (supplierRefNo || '') }]);
                            }
                            if (it.packUnit && it.packSize) {
                                await client.from('products').update({ pack_unit: it.packUnit, pack_size: it.packSize }).eq('id', it.productId);
                            }
                        }
                        await client.from('purchase_receipts').update({ status: 'finalized', finalized_at: new Date().toISOString() }).eq('id', rid);
                        flash('ยืนยันรับเข้าสำเร็จ สต็อกถูกอัปเดตแล้ว', 'success');
                    } else {
                        flash('บันทึกร่างสำเร็จ', 'success');
                    }
                    onDone();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                } finally {
                    setSaving(false);
                }
            };

            if (loading) return <div className="loading">กำลังโหลด...</div>;

            return (
                <div>
                    <h2>{receiptId ? 'แก้ไขใบรับสินค้า (ร่าง)' : 'สร้างใบรับสินค้าใหม่'}</h2>
                    <div className="grid-3">
                        <div className="form-group">
                            <label>รับมาจาก/บริษัท *</label>
                            <UnitInput value={supplierName} onChange={setSupplierName} options={suppliers.map(s => s.name)} placeholder="-- เลือกผู้ขาย/ซัพพลายเออร์ --" />
                        </div>
                        <div className="form-group">
                            <label>เลขที่ใบส่งของ/ใบแจ้งหนี้ (ถ้ามี)</label>
                            <input type="text" value={supplierRefNo} onChange={(e) => setSupplierRefNo(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>วันที่รับ</label>
                            <input type="date" value={receiptDate} onChange={(e) => setReceiptDate(e.target.value)} />
                        </div>
                    </div>
                    <div className="form-group">
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>

                    <h3 style={{marginTop: '10px', marginBottom: '10px'}}>รูปถ่ายใบส่งของ/สินค้า</h3>
                    <div className="row-actions" style={{marginBottom: '10px', flexWrap: 'wrap'}}>
                        {photos.map((ph, i) => (
                            <div key={i} style={{position: 'relative'}}>
                                <img src={ph.url} style={{width: '70px', height: '70px', objectFit: 'cover', borderRadius: '8px', border: '1px solid var(--border)'}} />
                                <button className="small danger" style={{position: 'absolute', top: '-8px', right: '-8px', padding: '2px 6px', borderRadius: '999px'}} onClick={() => removePhoto(i)}>×</button>
                            </div>
                        ))}
                    </div>
                    <div className="row-actions" style={{marginBottom: '20px'}}>
                        <label className="secondary small" style={{cursor: 'pointer', display: 'inline-block'}}>
                            📷 ถ่ายรูป
                            <input type="file" accept="image/*" capture="environment" style={{display: 'none'}} onChange={(e) => { handlePhotoFile(e.target.files[0]); e.target.value = ''; }} />
                        </label>
                        <label className="secondary small" style={{cursor: 'pointer', display: 'inline-block'}}>
                            🖼️ เลือกจากคลัง
                            <input type="file" accept="image/*" style={{display: 'none'}} onChange={(e) => { handlePhotoFile(e.target.files[0]); e.target.value = ''; }} />
                        </label>
                    </div>

                    <h3 style={{marginBottom: '10px'}}>เพิ่มรายการสินค้า</h3>
                    <div style={{border: '1.5px solid var(--primary)', borderRadius: '10px', padding: '12px', marginBottom: '15px'}}>
                        <div className="form-group">
                            <label>ค้นหาสินค้า (ชื่อ/รหัส)</label>
                            <input type="text" placeholder="พิมพ์ชื่อสินค้าหรือรหัส..." value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); }} />
                            {search && !pid && (<div className="search-results">
                                {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name} {formatUnit(p) ? '(' + formatUnit(p) + ')' : ''}</div>))}
                            </div>)}
                        </div>
                        <div className="grid-3">
                            <div className="form-group">
                                <label>สถานที่จัดเก็บ</label>
                                <select value={lid} onChange={(e) => setLid(e.target.value)}>
                                    <option value="">-- เลือกสถานที่ --</option>
                                    {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>หน่วยที่รับจากผู้ผลิต</label>
                                <UnitInput key={'pack-' + itemFormKey} value={packUnit} onChange={setPackUnit} options={PACK_UNITS} placeholder="-- เลือกหน่วย --" />
                            </div>
                            <div className="form-group">
                                <label>หน่วยย่อย (ที่ใช้ตัดสต็อก)</label>
                                <UnitInput key={'base-' + itemFormKey + '-' + pid} value={baseUnit} onChange={setBaseUnit} options={BASE_UNITS} placeholder="-- เลือกหน่วยย่อย --" />
                            </div>
                        </div>
                        <div className="grid-3">
                            <div className="form-group">
                                <label>จำนวนหน่วยต่อแพ็ค</label>
                                <input type="number" min="1" value={packSize} onChange={(e) => setPackSize(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>จำนวนที่รับ ({packUnit || 'หน่วย'})</label>
                                <input type="number" min="1" value={packQty} onChange={(e) => setPackQty(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>LOT (ถ้ามี)</label>
                                <input type="text" value={lotNumber} onChange={(e) => setLotNumber(e.target.value)} />
                            </div>
                        </div>
                        <div className="form-group">
                            <label>วันหมดอายุ (ถ้ามี)</label>
                            <input type="date" value={expiryDate} onChange={(e) => setExpiryDate(e.target.value)} style={{maxWidth: '220px'}} />
                        </div>
                        {packQty && packSize && parseFloat(packSize) > 1 && (
                            <div style={{fontSize: '12px', color: 'var(--text-muted)', marginBottom: '10px'}}>
                                = {(parseFloat(packQty) * parseFloat(packSize)).toFixed(0)} {baseUnit || 'หน่วย'} เข้าสต็อก
                            </div>
                        )}
                        <div className="grid-3">
                            <div className="form-group">
                                <label>ต้นทุน/หน่วยย่อย (บาท)</label>
                                <input type="number" value={cost} onChange={(e) => setCost(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>ราคาส่ง/หน่วยย่อย (บาท)</label>
                                <input type="number" value={wholesale} onChange={(e) => setWholesale(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>ราคาปลีก/หน่วยย่อย (บาท)</label>
                                <input type="number" value={retail} onChange={(e) => setRetail(e.target.value)} />
                            </div>
                        </div>
                        <button className="secondary" onClick={addItem}>+ เพิ่มรายการ</button>
                    </div>

                    <h3 style={{marginBottom: '10px'}}>รายการที่เพิ่มแล้ว ({items.length})</h3>
                    {items.map((it, i) => (<ReceiptItemRow key={i} item={it} isAdmin={isAdmin} canEditCost={true} onRemove={() => removeItem(i)} locations={locations} onUpdate={(patch) => updateItem(i, patch)} />))}
                    {items.length === 0 && <div style={{color: 'var(--text-muted)', marginBottom: '15px'}}>ยังไม่มีรายการ</div>}

                    <div className="row-actions" style={{marginTop: '20px'}}>
                        <button className="secondary" onClick={() => persist('draft')} disabled={saving}>บันทึกร่าง</button>
                        <button onClick={() => persist('finalized')} disabled={saving}>ยืนยันรับเข้า</button>
                        <button className="secondary" onClick={onCancel} disabled={saving}>ยกเลิก</button>
                    </div>
                </div>
            );
        }

        function ReceiptDetail({ receiptId, products, locations, isAdmin, flash, onBack, onChanged }) {
            const [receipt, setReceipt] = useState(null);
            const [items, setItems] = useState([]);
            const [photos, setPhotos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [editCostMode, setEditCostMode] = useState(false);
            const [costEdits, setCostEdits] = useState({});

            const load = async () => {
                setLoading(true);
                const [{ data: r }, { data: its }, { data: phs }] = await Promise.all([
                    client.from('purchase_receipts').select('*').eq('id', receiptId).single(),
                    client.from('purchase_receipt_items').select('*').eq('receipt_id', receiptId),
                    client.from('purchase_receipt_photos').select('*').eq('receipt_id', receiptId)
                ]);
                setReceipt(r);
                setItems(its || []);
                setPhotos(phs || []);
                const edits = {};
                (its || []).forEach(it => { edits[it.id] = it.cost_per_base_unit ?? ''; });
                setCostEdits(edits);
                setLoading(false);
            };
            useEffect(() => { load(); }, [receiptId]);

            const saveCostEdits = async () => {
                try {
                    for (const it of items) {
                        const newVal = costEdits[it.id] === '' ? null : parseFloat(costEdits[it.id]);
                        if (newVal !== it.cost_per_base_unit) {
                            await client.from('purchase_receipt_items').update({ cost_per_base_unit: newVal }).eq('id', it.id);
                        }
                    }
                    flash('บันทึกต้นทุนสำเร็จ', 'success');
                    setEditCostMode(false);
                    await load();
                    onChanged();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            if (loading) return <div className="loading">กำลังโหลด...</div>;
            if (!receipt) return <div>ไม่พบใบรับสินค้า</div>;

            return (
                <div>
                    <div className="print-area">
                        <h2>ใบรับสินค้า {receipt.receipt_no}</h2>
                        <div className="card">
                            <div><strong>ผู้ส่ง/บริษัท:</strong> {receipt.supplier_name}</div>
                            {receipt.supplier_ref_no && <div><strong>เลขที่ใบส่งของ:</strong> {receipt.supplier_ref_no}</div>}
                            <div><strong>วันที่รับ:</strong> {receipt.receipt_date}</div>
                            <div><strong>สถานะ:</strong> <span className={'badge ' + (receipt.status === 'finalized' ? 'badge-in' : 'badge-adj')}>{receipt.status === 'finalized' ? 'ยืนยันแล้ว' : 'ร่าง'}</span></div>
                            {receipt.notes && <div><strong>หมายเหตุ:</strong> {receipt.notes}</div>}
                            {receipt.created_by && <div><strong>ผู้บันทึก:</strong> {receipt.created_by}</div>}
                        </div>
                        {photos.length > 0 && (
                            <div className="row-actions no-print" style={{flexWrap: 'wrap', marginBottom: '15px'}}>
                                {photos.map(ph => (<img key={ph.id} src={ph.photo_url} style={{width: '90px', height: '90px', objectFit: 'cover', borderRadius: '8px', border: '1px solid var(--border)'}} />))}
                            </div>
                        )}
                        <h3 style={{marginBottom: '10px'}}>รายการสินค้า</h3>
                        <table>
                            <thead>
                                <tr><th>สินค้า</th><th>ที่อยู่</th><th>จำนวน</th>{isAdmin && <th>ต้นทุน/หน่วย</th>}<th>LOT</th><th>หมดอายุ</th></tr>
                            </thead>
                            <tbody>
                                {items.map(it => {
                                    const p = products.find(x => x.id === it.product_id);
                                    const l = locations.find(x => x.id === it.location_id);
                                    const total = parseFloat(it.pack_qty) * parseFloat(it.pack_size);
                                    return (
                                        <tr key={it.id}>
                                            <td>{p ? p.product_code + ' - ' + p.name : '-'}</td>
                                            <td>{l ? l.name : '-'}</td>
                                            <td>{it.pack_qty} {it.pack_unit || it.base_unit} {it.pack_size > 1 ? '(= ' + total.toFixed(0) + ' ' + (it.base_unit || '') + ')' : ''}</td>
                                            {isAdmin && (
                                                <td>
                                                    {editCostMode
                                                        ? <input type="number" value={costEdits[it.id]} onChange={(e) => setCostEdits({...costEdits, [it.id]: e.target.value})} style={{width: '90px'}} />
                                                        : (it.cost_per_base_unit ?? '-')}
                                                </td>
                                            )}
                                            <td>{it.lot_number || '-'}</td>
                                            <td>{it.expiry_date || '-'}</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                    <div className="row-actions no-print" style={{marginTop: '15px'}}>
                        <button className="secondary" onClick={onBack}>กลับ</button>
                        <button className="secondary" onClick={() => window.print()}>🖨️ พิมพ์ (A4)</button>
                        {isAdmin && !editCostMode && <button className="secondary" onClick={() => setEditCostMode(true)}>แก้ไขต้นทุน</button>}
                        {isAdmin && editCostMode && <button onClick={saveCostEdits}>บันทึกต้นทุน</button>}
                        {isAdmin && editCostMode && <button className="secondary" onClick={() => setEditCostMode(false)}>ยกเลิก</button>}
                    </div>
                </div>
            );
        }

        function Receiving({ products, locations, suppliers, loadData, msg, msgType, flash, staffName, isAdmin, receiveSeed, clearReceiveSeed }) {
            const [receipts, setReceipts] = useState([]);
            const [loadingList, setLoadingList] = useState(true);
            const [view, setView] = useState(receiveSeed ? 'form' : 'list');
            const [activeId, setActiveId] = useState(null);
            const [filterStatus, setFilterStatus] = useState('');

            const loadReceipts = async () => {
                setLoadingList(true);
                const { data } = await client.from('purchase_receipts').select('*').order('created_at', { ascending: false }).limit(200);
                setReceipts(data || []);
                setLoadingList(false);
            };
            useEffect(() => { loadReceipts(); }, []);

            const backToList = async () => { setView('list'); setActiveId(null); if (receiveSeed) clearReceiveSeed(); await loadReceipts(); await loadData(); };
            const openReceipt = (r) => { setActiveId(r.id); setView(r.status === 'draft' ? 'form' : 'detail'); };

            const filtered = filterStatus ? receipts.filter(r => r.status === filterStatus) : receipts;

            if (view === 'form') {
                return <ReceiptForm receiptId={activeId} products={products} locations={locations} suppliers={suppliers} staffName={staffName} isAdmin={isAdmin} flash={flash} onDone={backToList} onCancel={backToList} seed={activeId ? null : receiveSeed} />;
            }
            if (view === 'detail') {
                return <ReceiptDetail receiptId={activeId} products={products} locations={locations} isAdmin={isAdmin} flash={flash} onBack={backToList} onChanged={loadData} />;
            }

            return (
                <div>
                    <h2>รับเข้าสินค้า (ใบรับสินค้า)</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="row-actions" style={{marginBottom: '15px'}}>
                        <button onClick={() => { setActiveId(null); setView('form'); }}>+ สร้างใบรับสินค้าใหม่</button>
                        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} style={{maxWidth: '180px'}}>
                            <option value="">ทั้งหมด</option>
                            <option value="draft">ร่าง</option>
                            <option value="finalized">ยืนยันแล้ว</option>
                        </select>
                    </div>
                    {loadingList && <div className="loading">กำลังโหลด...</div>}
                    {!loadingList && filtered.map(r => (
                        <div key={r.id} className="card" style={{cursor: 'pointer'}} onClick={() => openReceipt(r)}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <div>
                                    <strong>{r.receipt_no}</strong> · {r.supplier_name}
                                    <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '3px'}}>{r.receipt_date} {r.supplier_ref_no ? '· อ้างอิง ' + r.supplier_ref_no : ''}</div>
                                </div>
                                <span className={'badge ' + (r.status === 'finalized' ? 'badge-in' : 'badge-adj')}>{r.status === 'finalized' ? 'ยืนยันแล้ว' : 'ร่าง'}</span>
                            </div>
                        </div>
                    ))}
                    {!loadingList && filtered.length === 0 && <div style={{color: 'var(--text-muted)', textAlign: 'center', padding: '20px'}}>ยังไม่มีใบรับสินค้า</div>}
                </div>
            );
        }

        function IssueStock({ products, locations, stock, loadData, msg, msgType, flash, staffName }) {
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [lid, setLid] = useState('');
            const [qty, setQty] = useState('');
            const [issueType, setIssueType] = useState('sale');
            const [notes, setNotes] = useState('');
            const [search, setSearch] = useState('');
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const selectedProduct = products.find(p => p.id === pid);
            const availableLocs = stock.filter(s => s.product_id === pid && parseFloat(s.quantity) > 0);
            const current = stock.find(x => x.product_id === pid && x.location_id === lid);

            const handle = async () => {
                if (!pid || !lid || !qty || parseFloat(qty) <= 0) { flash('กรอกข้อมูลให้ครบและจำนวนต้องมากกว่า 0'); return; }
                const q = parseFloat(qty);
                const s = stock.find(x => x.product_id === pid && x.location_id === lid);
                const avail = s ? parseFloat(s.quantity) : 0;
                if (q > avail) { flash('สต็อกไม่พอ (คงเหลือ ' + avail + ')'); return; }
                try {
                    await client.from('product_location_stock').update({ quantity: avail - q, updated_at: new Date().toISOString() }).eq('id', s.id);
                    await client.from('stock_movements').insert([{ product_id: pid, location_id: lid, quantity_change: -q, movement_type: issueType, notes, staff_name: staffName }]);
                    flash('บันทึกเบิกออกสำเร็จ', 'success');
                    setPid(''); setPLabel(''); setLid(''); setQty(''); setSearch(''); setNotes('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>เบิกสินค้าออก</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ค้นหาสินค้า</label>
                            <input type="text" placeholder="รหัส/ชื่อ" value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); setLid(''); }} />
                            {search && !pid && (<div className="search-results">
                                {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name} {formatUnit(p) ? '(' + formatUnit(p) + ')' : ''}</div>))}
                            </div>)}
                        </div>
                        <div className="form-group">
                            <label>ที่อยู่คลัง (มีสต็อก)</label>
                            <select value={lid} onChange={(e) => setLid(e.target.value)} disabled={!pid}>
                                <option value="">-- เลือก --</option>
                                {availableLocs.map(s => {
                                    const l = locations.find(x => x.id === s.location_id);
                                    return (<option key={s.id} value={s.location_id}>{l ? l.name : '-'} (คงเหลือ {s.quantity} {selectedProduct?.unit || ''})</option>);
                                })}
                            </select>
                        </div>
                    </div>
                    <div className="grid-3">
                        <div className="form-group">
                            <label>จำนวน{current ? ' (คงเหลือ ' + current.quantity + ' ' + (selectedProduct?.unit || '') + ')' : ''}</label>
                            <input type="number" min="1" value={qty} onChange={(e) => setQty(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>ประเภทการเบิก</label>
                            <select value={issueType} onChange={(e) => setIssueType(e.target.value)}>
                                <option value="sale">ขายหน้าร้าน</option>
                                <option value="transfer">โอนสาขาย่อย</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>หมายเหตุ{issueType === 'transfer' ? ' (ระบุสาขาปลายทาง)' : ''}</label>
                            <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={handle}>บันทึกเบิกออก</button>
                </div>
            );
        }

        const genPoNo = () => {
            const d = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            return 'PO' + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds()) + Math.floor(Math.random() * 90 + 10);
        };

        function PoForm({ poId, products, suppliers, staffName, flash, onDone, onCancel }) {
            const [loading, setLoading] = useState(!!poId);
            const [supplierName, setSupplierName] = useState('');
            const [orderDate, setOrderDate] = useState(new Date().toISOString().slice(0, 10));
            const [notes, setNotes] = useState('');
            const [items, setItems] = useState([]);
            const [saving, setSaving] = useState(false);

            const [search, setSearch] = useState('');
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [packUnit, setPackUnit] = useState('');
            const [packSize, setPackSize] = useState('1');
            const [packQty, setPackQty] = useState('');
            const [baseUnit, setBaseUnit] = useState('');
            const [cost, setCost] = useState('');
            const [costLoading, setCostLoading] = useState(false);
            const [itemFormKey, setItemFormKey] = useState(0);

            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const selectedProduct = products.find(p => p.id === pid);

            useEffect(() => {
                if (!poId) return;
                (async () => {
                    const [{ data: po }, { data: its }] = await Promise.all([
                        client.from('purchase_orders').select('*').eq('id', poId).single(),
                        client.from('purchase_order_items').select('*').eq('po_id', poId)
                    ]);
                    if (po) {
                        setSupplierName(po.supplier_name || '');
                        setOrderDate(po.order_date || new Date().toISOString().slice(0, 10));
                        setNotes(po.notes || '');
                    }
                    setItems((its || []).map(it => {
                        const p = products.find(x => x.id === it.product_id);
                        return {
                            id: it.id, productId: it.product_id, productLabel: p ? p.product_code + ' - ' + p.name : '-',
                            packUnit: it.unit || '', packSize: it.pack_size || 1, packQty: it.quantity,
                            baseUnit: it.base_unit || '', unitCost: it.unit_cost ?? ''
                        };
                    }));
                    setLoading(false);
                })();
            }, [poId]);

            useEffect(() => {
                if (!pid) { setCost(''); setBaseUnit(''); return; }
                setBaseUnit(selectedProduct?.unit || '');
                if (selectedProduct?.pack_unit) setPackUnit(selectedProduct.pack_unit);
                if (selectedProduct?.pack_size) setPackSize(String(selectedProduct.pack_size));
                setCostLoading(true);
                (async () => {
                    const { data } = await client.from('purchase_receipt_items').select('cost_per_base_unit, created_at').eq('product_id', pid).not('cost_per_base_unit', 'is', null).order('created_at', { ascending: false }).limit(1);
                    if (data && data[0]) {
                        setCost(String(data[0].cost_per_base_unit));
                    } else {
                        setCost(selectedProduct?.cost != null ? String(selectedProduct.cost) : '');
                    }
                    setCostLoading(false);
                })();
            }, [pid]);

            const addItem = () => {
                if (!pid || !packQty || parseFloat(packQty) <= 0) { flash('เลือกสินค้าและกรอกจำนวนให้ครบ'); return; }
                setItems([...items, { productId: pid, productLabel: pLabel, packUnit, packSize: parseFloat(packSize) || 1, packQty: parseFloat(packQty), baseUnit, unitCost: cost }]);
                setItemFormKey(k => k + 1);
                setPid(''); setPLabel(''); setSearch(''); setPackUnit(''); setPackSize('1'); setPackQty(''); setBaseUnit(''); setCost('');
            };

            const removeItem = (idx) => setItems(items.filter((_, i) => i !== idx));

            const total = items.reduce((sum, it) => sum + (parseFloat(it.packQty) || 0) * (parseFloat(it.packSize) || 1) * (parseFloat(it.unitCost) || 0), 0);

            const persist = async (status) => {
                if (!supplierName.trim()) { flash('กรอกชื่อผู้ขาย/ซัพพลายเออร์'); return; }
                if (items.length === 0) { flash('เพิ่มรายการสินค้าอย่างน้อย 1 รายการ'); return; }
                setSaving(true);
                try {
                    if (!suppliers.some(s => s.name === supplierName.trim())) {
                        await client.from('suppliers').insert([{ name: supplierName.trim() }]).select().then(() => {}, () => {});
                    }
                    let pid2 = poId;
                    const header = { supplier_name: supplierName.trim(), order_date: orderDate, notes: notes.trim() || null };
                    if (pid2) {
                        await client.from('purchase_orders').update(header).eq('id', pid2);
                        await client.from('purchase_order_items').delete().eq('po_id', pid2);
                    } else {
                        const { data, error } = await client.from('purchase_orders').insert([{ ...header, po_no: genPoNo(), status: 'draft', created_by: staffName }]).select('id').single();
                        if (error) throw error;
                        pid2 = data.id;
                    }
                    await client.from('purchase_order_items').insert(items.map(it => ({
                        po_id: pid2, product_id: it.productId, quantity: it.packQty, unit: it.packUnit || null,
                        pack_size: it.packSize || 1, base_unit: it.baseUnit || null,
                        unit_cost: it.unitCost === '' ? null : parseFloat(it.unitCost)
                    })));
                    if (status === 'ordered') {
                        for (const it of items) {
                            if (it.packUnit && it.packSize) {
                                await client.from('products').update({ pack_unit: it.packUnit, pack_size: it.packSize }).eq('id', it.productId);
                            }
                        }
                        await client.from('purchase_orders').update({ status: 'ordered', ordered_at: new Date().toISOString() }).eq('id', pid2);
                        flash('ยืนยันใบสั่งซื้อสำเร็จ', 'success');
                    } else {
                        flash('บันทึกร่างสำเร็จ', 'success');
                    }
                    onDone();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                } finally {
                    setSaving(false);
                }
            };

            if (loading) return <div className="loading">กำลังโหลด...</div>;

            return (
                <div>
                    <h2>{poId ? 'แก้ไขใบสั่งซื้อ (ร่าง)' : 'สร้างใบสั่งซื้อใหม่'}</h2>
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ผู้ขาย/ซัพพลายเออร์ *</label>
                            <UnitInput value={supplierName} onChange={setSupplierName} options={suppliers.map(s => s.name)} placeholder="-- เลือกผู้ขาย/ซัพพลายเออร์ --" />
                        </div>
                        <div className="form-group">
                            <label>วันที่สั่งซื้อ</label>
                            <input type="date" value={orderDate} onChange={(e) => setOrderDate(e.target.value)} />
                        </div>
                    </div>
                    <div className="form-group">
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>

                    <h3 style={{marginBottom: '10px'}}>เพิ่มรายการสินค้า</h3>
                    <div style={{border: '1.5px solid var(--primary)', borderRadius: '10px', padding: '12px', marginBottom: '15px'}}>
                        <div className="form-group">
                            <label>ค้นหาสินค้า (ชื่อ/รหัส)</label>
                            <input type="text" placeholder="พิมพ์ชื่อสินค้าหรือรหัส..." value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); }} />
                            {search && !pid && (<div className="search-results">
                                {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name} {formatUnit(p) ? '(' + formatUnit(p) + ')' : ''}</div>))}
                            </div>)}
                        </div>
                        <div className="grid-3">
                            <div className="form-group">
                                <label>หน่วยที่รับจากผู้ผลิต</label>
                                <UnitInput key={'po-pack-' + itemFormKey} value={packUnit} onChange={setPackUnit} options={PACK_UNITS} placeholder="-- เลือกหน่วย --" />
                            </div>
                            <div className="form-group">
                                <label>หน่วยย่อย (ที่ใช้อ้างอิงต้นทุน)</label>
                                <UnitInput key={'po-base-' + itemFormKey + '-' + pid} value={baseUnit} onChange={setBaseUnit} options={BASE_UNITS} placeholder="-- เลือกหน่วยย่อย --" />
                            </div>
                        </div>
                        <div className="grid-3">
                            <div className="form-group">
                                <label>จำนวนหน่วยต่อแพ็ค</label>
                                <input type="number" min="1" value={packSize} onChange={(e) => setPackSize(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>จำนวนที่สั่งซื้อ ({packUnit || 'หน่วย'})</label>
                                <input type="number" min="1" value={packQty} onChange={(e) => setPackQty(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>ต้นทุน/หน่วยย่อย (บาท) {costLoading && '(กำลังดึงราคาล่าสุด...)'}</label>
                                <input type="number" value={cost} onChange={(e) => setCost(e.target.value)} />
                            </div>
                        </div>
                        {packQty && packSize && parseFloat(packSize) > 1 && (
                            <div style={{fontSize: '12px', color: 'var(--text-muted)', marginBottom: '10px'}}>
                                = {(parseFloat(packQty) * parseFloat(packSize)).toFixed(0)} {baseUnit || 'หน่วย'}
                            </div>
                        )}
                        <button className="secondary" onClick={addItem}>+ เพิ่มรายการ</button>
                    </div>

                    <h3 style={{marginBottom: '10px'}}>รายการที่เพิ่มแล้ว ({items.length})</h3>
                    {items.map((it, i) => {
                        const totalBase = (parseFloat(it.packQty) || 0) * (parseFloat(it.packSize) || 1);
                        return (
                        <div key={i} style={{border: '1px solid var(--border)', borderRadius: '10px', padding: '10px', marginBottom: '10px'}}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start'}}>
                                <div>
                                    <strong>{it.productLabel}</strong>
                                    <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '3px'}}>
                                        จำนวน {it.packQty} {it.packUnit || it.baseUnit || 'หน่วย'} {it.packSize > 1 ? '× ' + it.packSize + ' = ' + totalBase.toFixed(0) + ' ' + (it.baseUnit || '') : ''}
                                    </div>
                                    <div style={{fontSize: '12px', color: 'var(--text-muted)'}}>
                                        ต้นทุน {it.unitCost || 0} บาท/{it.baseUnit || 'หน่วย'} = รวม {(totalBase * (parseFloat(it.unitCost) || 0)).toFixed(2)} บาท
                                    </div>
                                </div>
                                <button className="small danger" onClick={() => removeItem(i)}>ลบ</button>
                            </div>
                        </div>
                        );
                    })}
                    {items.length === 0 && <div style={{color: 'var(--text-muted)', marginBottom: '15px'}}>ยังไม่มีรายการ</div>}
                    {items.length > 0 && <div style={{textAlign: 'right', fontWeight: 600, marginBottom: '15px'}}>รวมทั้งสิ้น: {total.toFixed(2)} บาท</div>}

                    <div className="row-actions" style={{marginTop: '20px'}}>
                        <button className="secondary" onClick={() => persist('draft')} disabled={saving}>บันทึกร่าง</button>
                        <button onClick={() => persist('ordered')} disabled={saving}>ยืนยันสั่งซื้อ</button>
                        <button className="secondary" onClick={onCancel} disabled={saving}>ยกเลิก</button>
                    </div>
                </div>
            );
        }

        function PoDetail({ poId, products, onBack, onReceiveFromPo }) {
            const [po, setPo] = useState(null);
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                (async () => {
                    const [{ data: p }, { data: its }] = await Promise.all([
                        client.from('purchase_orders').select('*').eq('id', poId).single(),
                        client.from('purchase_order_items').select('*').eq('po_id', poId)
                    ]);
                    setPo(p);
                    setItems(its || []);
                    setLoading(false);
                })();
            }, [poId]);

            if (loading) return <div className="loading">กำลังโหลด...</div>;
            if (!po) return <div>ไม่พบใบสั่งซื้อ</div>;

            const total = items.reduce((sum, it) => sum + (parseFloat(it.quantity) || 0) * (parseFloat(it.pack_size) || 1) * (parseFloat(it.unit_cost) || 0), 0);

            const receiveFromThis = () => {
                onReceiveFromPo({
                    supplierName: po.supplier_name,
                    supplierRefNo: po.po_no,
                    notes: 'รับเข้าตามใบสั่งซื้อ ' + po.po_no,
                    items: items.map(it => {
                        const p = products.find(x => x.id === it.product_id);
                        return {
                            productId: it.product_id, productLabel: p ? p.product_code + ' - ' + p.name : '-',
                            locationId: '', locationLabel: '',
                            packUnit: it.unit || '', packSize: it.pack_size || 1, packQty: it.quantity,
                            baseUnit: it.base_unit || p?.unit || '', costPerBaseUnit: it.unit_cost ?? '',
                            lotNumber: '', expiryDate: ''
                        };
                    })
                });
            };

            return (
                <div>
                    <div className="print-area">
                        <h2>ใบสั่งซื้อ {po.po_no}</h2>
                        <div className="card">
                            <div><strong>ผู้ขาย/ซัพพลายเออร์:</strong> {po.supplier_name}</div>
                            <div><strong>วันที่สั่งซื้อ:</strong> {po.order_date}</div>
                            <div><strong>สถานะ:</strong> <span className="badge badge-in">ยืนยันแล้ว</span></div>
                            {po.notes && <div><strong>หมายเหตุ:</strong> {po.notes}</div>}
                            {po.created_by && <div><strong>ผู้บันทึก:</strong> {po.created_by}</div>}
                        </div>
                        <h3 style={{marginBottom: '10px'}}>รายการสินค้า</h3>
                        <table>
                            <thead><tr><th>สินค้า</th><th>จำนวน</th><th>ต้นทุน/หน่วยย่อย</th><th>รวม</th></tr></thead>
                            <tbody>
                                {items.map(it => {
                                    const p = products.find(x => x.id === it.product_id);
                                    const totalBase = (parseFloat(it.quantity) || 0) * (parseFloat(it.pack_size) || 1);
                                    return (
                                        <tr key={it.id}>
                                            <td>{p ? p.product_code + ' - ' + p.name : '-'}</td>
                                            <td>{it.quantity} {it.unit || ''} {it.pack_size > 1 ? '(= ' + totalBase.toFixed(0) + ' ' + (it.base_unit || '') + ')' : ''}</td>
                                            <td>{it.unit_cost ?? '-'}</td>
                                            <td>{(totalBase * (parseFloat(it.unit_cost) || 0)).toFixed(2)}</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                        <div style={{textAlign: 'right', fontWeight: 600, margin: '10px 0'}}>รวมทั้งสิ้น: {total.toFixed(2)} บาท</div>
                    </div>
                    <div className="row-actions no-print">
                        <button className="secondary" onClick={onBack}>กลับ</button>
                        <button className="secondary" onClick={() => window.print()}>🖨️ พิมพ์ (A4)</button>
                        <button onClick={receiveFromThis}>📥 รับเข้าจากใบนี้</button>
                    </div>
                </div>
            );
        }

        function PurchaseOrders({ products, suppliers, loadData, msg, msgType, flash, staffName, goReceiveFromPo }) {
            const [pos, setPos] = useState([]);
            const [loadingList, setLoadingList] = useState(true);
            const [view, setView] = useState('list');
            const [activeId, setActiveId] = useState(null);
            const [filterStatus, setFilterStatus] = useState('');

            const loadPos = async () => {
                setLoadingList(true);
                const { data } = await client.from('purchase_orders').select('*').order('created_at', { ascending: false }).limit(200);
                setPos(data || []);
                setLoadingList(false);
            };
            useEffect(() => { loadPos(); }, []);

            const backToList = async () => { setView('list'); setActiveId(null); await loadPos(); await loadData(); };
            const openPo = (p) => { setActiveId(p.id); setView(p.status === 'draft' ? 'form' : 'detail'); };

            const filtered = filterStatus ? pos.filter(p => p.status === filterStatus) : pos;

            if (view === 'form') {
                return <PoForm poId={activeId} products={products} suppliers={suppliers} staffName={staffName} flash={flash} onDone={backToList} onCancel={backToList} />;
            }
            if (view === 'detail') {
                return <PoDetail poId={activeId} products={products} onBack={backToList} onReceiveFromPo={goReceiveFromPo} />;
            }

            return (
                <div>
                    <h2>สั่งซื้อสินค้า (PO)</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="row-actions" style={{marginBottom: '15px'}}>
                        <button onClick={() => { setActiveId(null); setView('form'); }}>+ สร้างใบสั่งซื้อใหม่</button>
                        <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} style={{maxWidth: '180px'}}>
                            <option value="">ทั้งหมด</option>
                            <option value="draft">ร่าง</option>
                            <option value="ordered">ยืนยันแล้ว</option>
                        </select>
                    </div>
                    {loadingList && <div className="loading">กำลังโหลด...</div>}
                    {!loadingList && filtered.map(p => (
                        <div key={p.id} className="card" style={{cursor: 'pointer'}} onClick={() => openPo(p)}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <div>
                                    <strong>{p.po_no}</strong> · {p.supplier_name}
                                    <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '3px'}}>{p.order_date}</div>
                                </div>
                                <span className={'badge ' + (p.status === 'ordered' ? 'badge-in' : 'badge-adj')}>{p.status === 'ordered' ? 'ยืนยันแล้ว' : 'ร่าง'}</span>
                            </div>
                        </div>
                    ))}
                    {!loadingList && filtered.length === 0 && <div style={{color: 'var(--text-muted)', textAlign: 'center', padding: '20px'}}>ยังไม่มีใบสั่งซื้อ</div>}
                </div>
            );
        }

        const THAI_MONTHS = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
        const formatMonthYm = (ym) => {
            const [y, m] = ym.split('-').map(Number);
            return THAI_MONTHS[m - 1] + ' ' + (y + 543);
        };
        const formatBaht = (n) => n.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' บาท';

        function PurchasingStats({ products }) {
            const [receipts, setReceipts] = useState([]);
            const [items, setItems] = useState([]);
            const [loading, setLoading] = useState(true);
            const [supplierFilter, setSupplierFilter] = useState('');
            const [monthFilter, setMonthFilter] = useState('');

            useEffect(() => {
                (async () => {
                    setLoading(true);
                    const { data: r } = await client.from('purchase_receipts').select('*').eq('status', 'finalized').order('receipt_date', { ascending: false });
                    const receiptIds = (r || []).map(x => x.id);
                    let its = [];
                    if (receiptIds.length > 0) {
                        const { data } = await client.from('purchase_receipt_items').select('*').in('receipt_id', receiptIds);
                        its = data || [];
                    }
                    setReceipts(r || []);
                    setItems(its);
                    setLoading(false);
                })();
            }, []);

            if (loading) return <div className="loading">กำลังโหลด...</div>;

            const receiptById = Object.fromEntries(receipts.map(r => [r.id, r]));
            const rows = items.map(it => {
                const receipt = receiptById[it.receipt_id];
                const product = products.find(p => p.id === it.product_id);
                const qty = (parseFloat(it.pack_qty) || 0) * (parseFloat(it.pack_size) || 1);
                const cost = parseFloat(it.cost_per_base_unit) || 0;
                return { ...it, receipt, product, qty, total: qty * cost };
            }).filter(r => r.receipt);

            const supplierNames = [...new Set(receipts.map(r => r.supplier_name).filter(Boolean))].sort();
            const months = [...new Set(receipts.map(r => r.receipt_date?.slice(0, 7)).filter(Boolean))].sort().reverse();

            const filteredRows = rows.filter(r => {
                if (supplierFilter && r.receipt.supplier_name !== supplierFilter) return false;
                if (monthFilter && r.receipt.receipt_date?.slice(0, 7) !== monthFilter) return false;
                return true;
            });

            const grandTotal = filteredRows.reduce((s, r) => s + r.total, 0);
            const receiptCount = new Set(filteredRows.map(r => r.receipt_id)).size;

            const byProduct = {};
            filteredRows.forEach(r => {
