<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลังสินค้า</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 20px; }
        h2 { color: #333; margin: 20px 0 15px 0; font-size: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .nav-tab { padding: 10px 20px; cursor: pointer; background: none; border: none; border-bottom: 3px solid transparent; font-size: 14px; }
        .nav-tab.active { border-bottom-color: #007bff; color: #007bff; font-weight: bold; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #f9f9f9; padding: 15px; border-radius: 4px; text-align: center; border-left: 4px solid #007bff; }
        .stat-value { font-size: 28px; font-weight: bold; color: #007bff; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        .alert { padding: 12px; margin-bottom: 15px; border-radius: 4px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .loading { text-align: center; padding: 40px; color: #999; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f9f9f9; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; font-weight: bold; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;
        const supabaseUrl = 'https://fimdhwhaabryezgramxa.supabase.co';
        const supabaseKey = 'REDACTED_SERVICE_ROLE_KEY_ROTATED';
        const client = createClient(supabaseUrl, supabaseKey);

        function App() {
            const [tab, setTab] = useState('home');
            const [products, setProducts] = useState([]);
            const [locations, setLocations] = useState([]);
            const [stock, setStock] = useState([]);
            const [loading, setLoading] = useState(true);
            const [msg, setMsg] = useState('');

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                setLoading(true);
                try {
                    let allProds = [];
                    for (let i = 0; i < 5; i++) {
                        const from = i * 1000;
                        const to = from + 999;
                        const res = await client.from('products').select('*').range(from, to);
                        if (res.data && res.data.length > 0) {
                            allProds = allProds.concat(res.data);
                        }
                        if (!res.data || res.data.length < 1000) break;
                    }
                    const [locRes, stockRes] = await Promise.all([
                        client.from('storage_locations').select('*'),
                        client.from('product_location_stock').select('*').limit(10000)
                    ]);
                    setProducts(allProds);
                    setLocations(locRes.data || []);
                    setStock(stockRes.data || []);
                } catch (err) {
                    setMsg('Error: ' + err.message);
                }
                setLoading(false);
            };

            const Home = () => {
                const total = stock.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
                return (
                    <div>
                        <div className="stats">
                            <div className="stat-box"><div className="stat-value">{products.length}</div><div className="stat-label">สินค้า</div></div>
                            <div className="stat-box"><div className="stat-value">{locations.length}</div><div className="stat-label">ที่อยู่</div></div>
                            <div className="stat-box"><div className="stat-value">{total.toFixed(0)}</div><div className="stat-label">จำนวน</div></div>
                            <div className="stat-box"><div className="stat-value">{new Set(stock.map(s => s.location_id)).size}</div><div className="stat-label">ใช้งาน</div></div>
                        </div>
                    </div>
                );
            };

            const Receiving = () => {
                const [pid, setPid] = useState('');
                const [lid, setLid] = useState('');
                const [qty, setQty] = useState('');
                const [search, setSearch] = useState('');
                const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);

                const handle = async () => {
                    if (!pid || !lid || !qty) { setMsg('กรอกข้อมูลให้ครบ'); return; }
                    try {
                        await client.from('receiving_logs').insert([{ product_id: pid, location_id: lid, quantity: parseFloat(qty) }]);
                        const s = stock.find(x => x.product_id === pid && x.location_id === lid);
                        if (s) {
                            await client.from('product_location_stock').update({ quantity: parseFloat(s.quantity) + parseFloat(qty) }).eq('id', s.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: pid, location_id: lid, quantity: parseFloat(qty) }]);
                        }
                        setMsg('บันทึกสำเร็จ');
                        setPid(''); setLid(''); setQty(''); setSearch('');
                        await loadData();
                    } catch (err) {
                        setMsg('Error: ' + err.message);
                    }
                };

                return (
                    <div>
                        <h2>รับเข้าสินค้า</h2>
                        {msg && <div className="alert alert-error">{msg}</div>}
                        <div className="grid-2">
                            <div className="form-group">
                                <label>ค้นหาสินค้า</label>
                                <input type="text" placeholder="รหัส/ชื่อ" value={search} onChange={(e) => setSearch(e.target.value)} />
                                {search && (<div style={{border: '1px solid #ddd', maxHeight: '150px', overflowY: 'auto'}}>
                                    {filtered.map(p => (<div key={p.id} onClick={() => {setPid(p.id); setSearch('');}} style={{padding: '8px', borderBottom: '1px solid #eee', cursor: 'pointer'}}>{p.product_code} - {p.name}</div>))}
                                </div>)}
                            </div>
                            <div className="form-group">
                                <label>ที่อยู่คลัง</label>
                                <select value={lid} onChange={(e) => setLid(e.target.value)}>
                                    <option value="">-- เลือก --</option>
                                    {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                                </select>
                            </div>
                        </div>
                        <div className="form-group">
                            <label>จำนวน</label>
                            <input type="number" min="1" value={qty} onChange={(e) => setQty(e.target.value)} />
                        </div>
                        <button onClick={handle}>บันทึก</button>
                    </div>
                );
            };

            const Warehouse = () => {
                const [search, setSearch] = useState('');
                const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase())).slice(0, 50);
                return (
                    <div>
                        <h2>จัดการคลัง</h2>
                        <input type="text" placeholder="ค้นหา..." value={search} onChange={(e) => setSearch(e.target.value)} style={{marginBottom: '15px'}} />
                        {filtered.map(p => {
                            const ps = stock.filter(s => s.product_id === p.id);
                            const tot = ps.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
                            return (
                                <div key={p.id} style={{padding: '12px', background: '#f9f9f9', borderRadius: '4px', marginBottom: '15px'}}>
                                    <strong>{p.product_code}</strong> - {p.name}
                                    <div style={{fontSize: '12px', color: '#666', marginTop: '5px'}}>รวม: {tot.toFixed(0)} {p.unit}</div>
                                    {ps.map(s => {
                                        const l = locations.find(x => x.id === s.location_id);
                                        return (<div key={s.id} style={{fontSize: '12px', color: '#666', marginTop: '3px'}}>📍 {l.name}: {s.quantity}</div>);
                                    })}
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const Locations = () => {
                const [name, setName] = useState('');
                const [addr, setAddr] = useState('');

                const add = async () => {
                    if (!name.trim()) { setMsg('ระบุชื่อ'); return; }
                    try {
                        await client.from('storage_locations').insert([{ name, address: addr }]);
                        setMsg('เพิ่มสำเร็จ');
                        setName(''); setAddr('');
                        await loadData();
                    } catch (err) {
                        setMsg('Error: ' + err.message);
                    }
                };

                return (
                    <div>
                        <h2>จัดการที่อยู่</h2>
                        {msg && <div className="alert alert-error">{msg}</div>}
                        <div className="grid-2">
                            <div className="form-group">
                                <label>ชื่อที่อยู่</label>
                                <input type="text" value={name} onChange={(e) => setName(e.target.value)} />
                            </div>
                            <div className="form-group">
                                <label>ที่อยู่</label>
                                <input type="text" value={addr} onChange={(e) => setAddr(e.target.value)} />
                            </div>
                        </div>
                        <button onClick={add}>เพิ่มที่อยู่</button>
                        <h3 style={{marginTop: '25px'}}>ที่อยู่ทั้งหมด</h3>
                        {locations.map(l => (<div key={l.id} style={{padding: '12px', background: '#f9f9f9', borderRadius: '4px', marginBottom: '10px'}}><strong>{l.name}</strong><div style={{fontSize: '12px', color: '#666'}}>{l.address}</div></div>))}
                    </div>
                );
            };

            if (loading) return <div className="container"><div className="loading">กำลังโหลด...</div></div>;

            return (
                <div className="container">
                    <h1>🏭 ระบบจัดการคลังสินค้า</h1>
                    <div className="nav-tabs">
                        <button className={'nav-tab ' + (tab === 'home' ? 'active' : '')} onClick={() => setTab('home')}>หน้าแรก</button>
                        <button className={'nav-tab ' + (tab === 'receiving' ? 'active' : '')} onClick={() => setTab('receiving')}>รับเข้า</button>
                        <button className={'nav-tab ' + (tab === 'warehouse' ? 'active' : '')} onClick={() => setTab('warehouse')}>คลัง</button>
                        <button className={'nav-tab ' + (tab === 'locations' ? 'active' : '')} onClick={() => setTab('locations')}>ที่อยู่</button>
                    </div>
                    {tab === 'home' && <Home />}
                    {tab === 'receiving' && <Receiving />}
                    {tab === 'warehouse' && <Warehouse />}
                    {tab === 'locations' && <Locations />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
