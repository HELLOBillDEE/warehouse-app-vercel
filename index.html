<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลังสินค้า</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B5EFB;
            --primary-dark: #2C48DE;
            --primary-light: #EEF1FF;
            --bg: #F3F5FB;
            --card: #FFFFFF;
            --text: #1E2233;
            --text-muted: #8A8FA3;
            --border: #E7E9F3;
            --success-bg: #E4F7EC;
            --success-text: #1A8A4E;
            --danger: #F04452;
            --danger-bg: #FDECEE;
            --danger-text: #D2313D;
            --warn-bg: #FFF3D6;
            --warn-text: #9A6A00;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
            background: var(--bg);
            padding: 28px 20px;
            color: var(--text);
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 1px 3px rgba(30, 34, 51, 0.04), 0 12px 32px -12px rgba(30, 34, 51, 0.10);
            display: flex;
            align-items: stretch;
        }
        .sidebar {
            width: 236px;
            flex-shrink: 0;
            background: var(--bg);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            border-radius: 20px 0 0 20px;
            position: sticky;
            top: 0;
            align-self: flex-start;
            max-height: 100vh;
            overflow-y: auto;
        }
        .main-content { flex: 1; min-width: 0; padding: 28px 32px; }
        .app-header { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; padding: 0 6px; }
        .app-header .logo-badge {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #6B8CFF);
            display: flex; align-items: center; justify-content: center;
            color: white; flex-shrink: 0;
            box-shadow: 0 8px 16px -6px rgba(59, 94, 251, 0.45);
        }
        h1 { color: var(--text); font-size: 17px; font-weight: 700; line-height: 1.25; }
        .app-header .app-subtitle { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; }
        h2 { color: var(--text); margin: 4px 0 18px 0; font-size: 18px; font-weight: 600; }
        h3 { color: var(--text); font-size: 15px; font-weight: 600; }
        .nav-tabs {
            display: flex; flex-direction: column; gap: 2px;
        }
        .nav-tab {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; cursor: pointer; background: none; color: var(--text-muted);
            border: none; border-radius: 10px; font-size: 13.5px; font-weight: 500;
            font-family: inherit; transition: background 0.15s, color 0.15s;
            width: 100%; text-align: left;
        }
        .nav-tab:hover { color: var(--text); background: var(--border); }
        .nav-tab.active { background: var(--card); color: var(--primary); font-weight: 600; box-shadow: 0 2px 8px rgba(30,34,51,0.08); }
        .nav-tab svg { flex-shrink: 0; }
        @media (max-width: 760px) {
            .container { flex-direction: column; }
            .sidebar {
                width: 100%; border-right: none; border-bottom: 1px solid var(--border);
                border-radius: 20px 20px 0 0; position: static; max-height: none;
            }
            .nav-tabs { flex-direction: row; flex-wrap: wrap; }
            .nav-tab { width: auto; }
            .main-content { padding: 22px 18px; }
        }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
        .stat-box {
            background: var(--card); padding: 18px 18px 16px; border-radius: var(--radius);
            border: 1px solid var(--border); position: relative;
        }
        .stat-box .stat-icon {
            width: 34px; height: 34px; border-radius: 10px; background: var(--primary-light);
            color: var(--primary); display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .stat-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.1; }
        .stat-label { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text); font-size: 13.5px; }
        input, select, textarea {
            width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
            background: var(--card); color: var(--text); font-size: 14px; font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light);
        }
        button {
            padding: 10px 20px; background: var(--primary); color: white; border: none;
            border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
            font-family: inherit; transition: background 0.15s, transform 0.05s;
        }
        button:hover { background: var(--primary-dark); }
        button:active { transform: translateY(1px); }
        button.secondary { background: var(--bg); color: var(--text); }
        button.secondary:hover { background: var(--border); }
        button.danger { background: var(--danger-bg); color: var(--danger-text); }
        button.danger:hover { background: var(--danger); color: white; }
        button.small { padding: 7px 13px; font-size: 12.5px; border-radius: 8px; }
        .alert {
            padding: 12px 16px; margin-bottom: 16px; border-radius: 12px; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-error { background: var(--danger-bg); color: var(--danger-text); }
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { background: var(--bg); color: var(--text-muted); padding: 11px 12px; text-align: left; font-weight: 600; font-size: 12.5px; }
        th:first-child { border-radius: 8px 0 0 8px; }
        th:last-child { border-radius: 0 8px 8px 0; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card {
            padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); margin-bottom: 12px; transition: box-shadow 0.15s;
        }
        .card:hover { box-shadow: 0 4px 14px -6px rgba(30,34,51,0.10); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
        .badge-in { background: var(--success-bg); color: var(--success-text); }
        .badge-out { background: var(--danger-bg); color: var(--danger-text); }
        .badge-adj { background: var(--warn-bg); color: var(--warn-text); }
        .row-actions { display: flex; gap: 8px; margin-top: 10px; }
        .loc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .loc-tag { display: inline-block; background: var(--primary-light); color: var(--primary-dark); padding: 4px 11px; border-radius: 999px; font-size: 11.5px; font-weight: 500; }
        .search-results { border: 1px solid var(--border); border-radius: 10px; margin-top: 6px; max-height: 170px; overflow-y: auto; box-shadow: 0 8px 20px -8px rgba(30,34,51,0.15); }
        .search-result-item { padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13.5px; }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: var(--primary-light); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;
        const supabaseUrl = 'https://fimdhwhaabryezgramxa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbWRod2hhYWJyeWV6Z3JhbXhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTkxNDUsImV4cCI6MjA5ODk3NTE0NX0.eTkZCxDNKQbFCZmBIXjfprESFKUzDuEjaFokvueof6s';
        const client = createClient(supabaseUrl, supabaseKey);

        const MOVEMENT_LABELS = {
            receiving: 'รับเข้า',
            sale: 'ขายหน้าร้าน',
            transfer: 'โอนสาขา',
            adjustment: 'ปรับปรุง'
        };

        const daysUntil = (dateStr) => {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr + 'T00:00:00');
            return Math.round((target - today) / 86400000);
        };

        const iconProps = { xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 24 24', width: 18, height: 18, fill: 'none', stroke: 'currentColor', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round' };
        const IconHome = () => (<svg {...iconProps}><path d="M3.5 11.5L12 4l8.5 7.5" /><path d="M5.5 10v9.5h13V10" /><path d="M9.5 19.5V14h5v5.5" /></svg>);
        const IconIn = () => (<svg {...iconProps}><rect x="4" y="4" width="16" height="16" rx="4" /><path d="M12 8.5v7M9 12.5l3 3 3-3" /></svg>);
        const IconOut = () => (<svg {...iconProps}><rect x="4" y="4" width="16" height="16" rx="4" /><path d="M12 15.5v-7M9 11.5l3-3 3 3" /></svg>);
        const IconBox = () => (<svg {...iconProps}><path d="M12 3.5l8 4v9l-8 4-8-4v-9l8-4z" /><path d="M4 7.5l8 4 8-4M12 11.5v9" /></svg>);
        const IconSwap = () => (<svg {...iconProps}><path d="M4 8h13.5M14.5 4.5L17.5 8l-3 3.5" /><path d="M20 16H6.5M9.5 12.5L6.5 16l3 3.5" /></svg>);
        const IconAlert = () => (<svg {...iconProps}><path d="M12 3.5l9 16h-18l9-16z" /><path d="M12 10v4" /><circle cx="12" cy="17" r="0.6" fill="currentColor" stroke="none" /></svg>);
        const IconHistory = () => (<svg {...iconProps}><circle cx="12" cy="12" r="8.5" /><path d="M12 7.5V12l3.2 2" /></svg>);
        const IconPin = () => (<svg {...iconProps}><path d="M12 21s6.5-6.2 6.5-11.2A6.5 6.5 0 105.5 9.8C5.5 14.8 12 21 12 21z" /><circle cx="12" cy="9.7" r="2.3" /></svg>);
        const IconUser = () => (<svg {...iconProps}><circle cx="12" cy="8.3" r="3.3" /><path d="M5 20c1-3.9 3.8-5.8 7-5.8s6 1.9 7 5.8" /></svg>);
        const IconLogo = () => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="white" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3.5l8 4v9l-8 4-8-4v-9l8-4z" /><path d="M4 7.5l8 4 8-4M12 11.5v9" /></svg>);

        function Home({ products, locations, stock, movements }) {
            const total = stock.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
            return (
                <div>
                    <div className="stats">
                        <div className="stat-box"><div className="stat-icon"><IconBox /></div><div className="stat-value">{products.length}</div><div className="stat-label">สินค้า</div></div>
                        <div className="stat-box"><div className="stat-icon"><IconPin /></div><div className="stat-value">{locations.length}</div><div className="stat-label">ที่อยู่</div></div>
                        <div className="stat-box"><div className="stat-icon"><IconIn /></div><div className="stat-value">{total.toFixed(0)}</div><div className="stat-label">จำนวน</div></div>
                        <div className="stat-box"><div className="stat-icon"><IconSwap /></div><div className="stat-value">{new Set(stock.map(s => s.location_id)).size}</div><div className="stat-label">ใช้งาน</div></div>
                    </div>
                    <h2>รายการล่าสุด</h2>
                    {movements.slice(0, 10).map(m => {
                        const p = products.find(x => x.id === m.product_id);
                        const l = locations.find(x => x.id === m.location_id);
                        const isOut = parseFloat(m.quantity_change) < 0;
                        return (
                            <div key={m.id} className="card" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <div>
                                    <span className={'badge ' + (m.movement_type === 'adjustment' ? 'badge-adj' : (isOut ? 'badge-out' : 'badge-in'))}>{MOVEMENT_LABELS[m.movement_type] || m.movement_type}</span>
                                    <strong style={{marginLeft: '8px'}}>{p ? p.product_code + ' - ' + p.name : '-'}</strong>
                                    <div style={{fontSize: '12px', color: '#666'}}>📍 {l ? l.name : '-'}</div>
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <div style={{fontWeight: 'bold', color: isOut ? '#721c24' : '#155724'}}>{isOut ? '' : '+'}{m.quantity_change}</div>
                                    <div style={{fontSize: '11px', color: '#999'}}>{new Date(m.created_at).toLocaleString('th-TH')}</div>
                                </div>
                            </div>
                        );
                    })}
                    {movements.length === 0 && <div style={{color: '#999'}}>ยังไม่มีรายการ</div>}
                </div>
            );
        }

        function Receiving({ products, locations, stock, loadData, msg, msgType, flash, staffName }) {
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [search, setSearch] = useState('');
            const [notes, setNotes] = useState('');
            const [rows, setRows] = useState([{ lid: '', qty: '', lot: '', expiry: '' }]);
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const product = products.find(p => p.id === pid);

            const setRow = (i, patch) => setRows(rows.map((r, idx) => idx === i ? { ...r, ...patch } : r));
            const addRow = () => setRows([...rows, { lid: '', qty: '', lot: '', expiry: '' }]);
            const removeRow = (i) => setRows(rows.filter((_, idx) => idx !== i));

            const handle = async () => {
                const validRows = rows.filter(r => r.lid && r.qty && parseFloat(r.qty) > 0);
                if (!pid || validRows.length === 0) { flash('เลือกสินค้าและกรอกที่อยู่กับจำนวนอย่างน้อย 1 แถว'); return; }
                try {
                    const runningQty = {};
                    const rowIdByLoc = {};
                    for (const r of validRows) {
                        const q = parseFloat(r.qty);
                        await client.from('receiving_logs').insert([{ product_id: pid, location_id: r.lid, quantity: q, notes }]);
                        if (!(r.lid in runningQty)) {
                            const s = stock.find(x => x.product_id === pid && x.location_id === r.lid);
                            runningQty[r.lid] = s ? parseFloat(s.quantity) : 0;
                            if (s) rowIdByLoc[r.lid] = s.id;
                        }
                        runningQty[r.lid] += q;
                        if (rowIdByLoc[r.lid]) {
                            await client.from('product_location_stock').update({ quantity: runningQty[r.lid], updated_at: new Date().toISOString() }).eq('id', rowIdByLoc[r.lid]);
                        } else {
                            const { data } = await client.from('product_location_stock').insert([{ product_id: pid, location_id: r.lid, quantity: runningQty[r.lid] }]).select('id');
                            if (data && data[0]) rowIdByLoc[r.lid] = data[0].id;
                        }
                        await client.from('stock_movements').insert([{ product_id: pid, location_id: r.lid, quantity_change: q, movement_type: 'receiving', notes, staff_name: staffName }]);
                        if (r.lot || r.expiry) {
                            await client.from('stock_lots').insert([{ product_id: pid, location_id: r.lid, lot_number: r.lot || null, expiry_date: r.expiry || null, quantity: q, notes }]);
                        }
                    }
                    flash('บันทึกรับเข้าสำเร็จ', 'success');
                    setPid(''); setPLabel(''); setSearch(''); setNotes(''); setRows([{ lid: '', qty: '', lot: '', expiry: '' }]);
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>รับเข้าสินค้า</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="form-group">
                        <label>ค้นหาสินค้า</label>
                        <input type="text" placeholder="รหัส/ชื่อ" value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); }} />
                        {search && !pid && (<div className="search-results">
                            {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name} {p.unit ? '(' + p.unit + ')' : ''}</div>))}
                        </div>)}
                        {product && <div style={{fontSize: '12px', color: '#666', marginTop: '5px'}}>หน่วย: {product.unit || '-'}</div>}
                    </div>
                    {rows.map((r, i) => (
                        <div key={i} style={{border: '1px solid #eee', borderRadius: '4px', padding: '10px', marginBottom: '10px'}}>
                            <div className="grid-3" style={{alignItems: 'end'}}>
                                <div className="form-group">
                                    <label>ที่อยู่คลัง</label>
                                    <select value={r.lid} onChange={(e) => setRow(i, { lid: e.target.value })}>
                                        <option value="">-- เลือก --</option>
                                        {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>จำนวน{product?.unit ? ' (' + product.unit + ')' : ''}</label>
                                    <input type="number" min="1" value={r.qty} onChange={(e) => setRow(i, { qty: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    {rows.length > 1 && <button className="secondary" onClick={() => removeRow(i)}>ลบแถว</button>}
                                </div>
                            </div>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label>LOT (ถ้ามี)</label>
                                    <input type="text" value={r.lot} onChange={(e) => setRow(i, { lot: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    <label>วันหมดอายุ (ถ้ามี)</label>
                                    <input type="date" value={r.expiry} onChange={(e) => setRow(i, { expiry: e.target.value })} />
                                </div>
                            </div>
                        </div>
                    ))}
                    <button className="secondary small" onClick={addRow} style={{marginBottom: '15px'}}>+ เพิ่มที่อยู่</button>
                    <div className="form-group">
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>
                    <button onClick={handle}>บันทึกรับเข้า</button>
                </div>
            );
        }

        function IssueStock({ products, locations, stock, loadData, msg, msgType, flash, staffName }) {
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [lid, setLid] = useState('');
            const [qty, setQty] = useState('');
            const [issueType, setIssueType] = useState('sale');
            const [notes, setNotes] = useState('');
            const [search, setSearch] = useState('');
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const availableLocs = stock.filter(s => s.product_id === pid && parseFloat(s.quantity) > 0);
            const current = stock.find(x => x.product_id === pid && x.location_id === lid);

            const handle = async () => {
                if (!pid || !lid || !qty || parseFloat(qty) <= 0) { flash('กรอกข้อมูลให้ครบและจำนวนต้องมากกว่า 0'); return; }
                const q = parseFloat(qty);
                const s = stock.find(x => x.product_id === pid && x.location_id === lid);
                const avail = s ? parseFloat(s.quantity) : 0;
                if (q > avail) { flash('สต็อกไม่พอ (คงเหลือ ' + avail + ')'); return; }
                try {
                    await client.from('product_location_stock').update({ quantity: avail - q, updated_at: new Date().toISOString() }).eq('id', s.id);
                    await client.from('stock_movements').insert([{ product_id: pid, location_id: lid, quantity_change: -q, movement_type: issueType, notes, staff_name: staffName }]);
                    flash('บันทึกเบิกออกสำเร็จ', 'success');
                    setPid(''); setPLabel(''); setLid(''); setQty(''); setSearch(''); setNotes('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>เบิกสินค้าออก</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ค้นหาสินค้า</label>
                            <input type="text" placeholder="รหัส/ชื่อ" value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); setLid(''); }} />
                            {search && !pid && (<div className="search-results">
                                {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name}</div>))}
                            </div>)}
                        </div>
                        <div className="form-group">
                            <label>ที่อยู่คลัง (มีสต็อก)</label>
                            <select value={lid} onChange={(e) => setLid(e.target.value)} disabled={!pid}>
                                <option value="">-- เลือก --</option>
                                {availableLocs.map(s => {
                                    const l = locations.find(x => x.id === s.location_id);
                                    return (<option key={s.id} value={s.location_id}>{l ? l.name : '-'} (คงเหลือ {s.quantity})</option>);
                                })}
                            </select>
                        </div>
                    </div>
                    <div className="grid-3">
                        <div className="form-group">
                            <label>จำนวน{current ? ' (คงเหลือ ' + current.quantity + ')' : ''}</label>
                            <input type="number" min="1" value={qty} onChange={(e) => setQty(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>ประเภทการเบิก</label>
                            <select value={issueType} onChange={(e) => setIssueType(e.target.value)}>
                                <option value="sale">ขายหน้าร้าน</option>
                                <option value="transfer">โอนสาขาย่อย</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>หมายเหตุ{issueType === 'transfer' ? ' (ระบุสาขาปลายทาง)' : ''}</label>
                            <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={handle}>บันทึกเบิกออก</button>
                </div>
            );
        }

        function Warehouse({ products, locations, stock, loadData, msg, msgType, flash, staffName }) {
            const [search, setSearch] = useState('');
            const [editId, setEditId] = useState(null);
            const [editVals, setEditVals] = useState({});
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 50);

            const startEdit = (p) => {
                const ps = stock.filter(s => s.product_id === p.id);
                const qtyByLoc = {};
                const lotByLoc = {};
                const expiryByLoc = {};
                locations.forEach(l => {
                    const s = ps.find(x => x.location_id === l.id);
                    qtyByLoc[l.id] = s ? s.quantity : 0;
                    lotByLoc[l.id] = '';
                    expiryByLoc[l.id] = '';
                });
                setEditId(p.id);
                setEditVals({ name: p.name, unit: p.unit || '', price: p.price || '', qtyByLoc, lotByLoc, expiryByLoc });
            };

            const cancelEdit = () => { setEditId(null); setEditVals({}); };

            const saveEdit = async (p) => {
                try {
                    await client.from('products').update({ name: editVals.name, unit: editVals.unit, price: editVals.price === '' ? null : parseFloat(editVals.price) }).eq('id', p.id);
                    const ps = stock.filter(s => s.product_id === p.id);
                    for (const l of locations) {
                        const s = ps.find(x => x.location_id === l.id);
                        const newQty = parseFloat(editVals.qtyByLoc[l.id]);
                        const oldQty = s ? parseFloat(s.quantity) : 0;
                        if (isNaN(newQty) || newQty === oldQty) continue;
                        if (s) {
                            await client.from('product_location_stock').update({ quantity: newQty, updated_at: new Date().toISOString() }).eq('id', s.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: p.id, location_id: l.id, quantity: newQty }]);
                        }
                        await client.from('stock_movements').insert([{ product_id: p.id, location_id: l.id, quantity_change: newQty - oldQty, movement_type: 'adjustment', notes: 'แก้ไขจากหน้าคลังสินค้า', staff_name: staffName }]);
                        const lot = editVals.lotByLoc[l.id];
                        const expiry = editVals.expiryByLoc[l.id];
                        if (newQty > oldQty && (lot || expiry)) {
                            await client.from('stock_lots').insert([{ product_id: p.id, location_id: l.id, lot_number: lot || null, expiry_date: expiry || null, quantity: newQty - oldQty, notes: 'แก้ไขจากหน้าคลังสินค้า' }]);
                        }
                    }
                    flash('บันทึกการแก้ไขสำเร็จ', 'success');
                    cancelEdit();
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>คลังสินค้า</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <input type="text" placeholder="ค้นหา..." value={search} onChange={(e) => setSearch(e.target.value)} style={{marginBottom: '15px'}} />
                    {filtered.map(p => {
                        const ps = stock.filter(s => s.product_id === p.id);
                        const tot = ps.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
                        const isEditing = editId === p.id;
                        return (
                            <div key={p.id} className="card">
                                {!isEditing && (
                                    <div>
                                        <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                            <div>
                                                <strong>{p.product_code}</strong> - {p.name}
                                                <div style={{fontSize: '12px', color: '#666', marginTop: '5px'}}>รวม: {tot.toFixed(0)} {p.unit} {p.price ? '· ราคา ' + p.price + ' บาท' : ''}</div>
                                            </div>
                                            <button className="small secondary" onClick={() => startEdit(p)}>แก้ไข</button>
                                        </div>
                                        <div className="loc-tags">
                                            {ps.filter(s => parseFloat(s.quantity) > 0).map(s => {
                                                const l = locations.find(x => x.id === s.location_id);
                                                return (<span key={s.id} className="loc-tag">📍 {l ? l.name : '-'}: {s.quantity}</span>);
                                            })}
                                            {ps.filter(s => parseFloat(s.quantity) > 0).length === 0 && <span style={{fontSize: '11px', color: '#999'}}>ยังไม่มีสต็อก</span>}
                                        </div>
                                    </div>
                                )}
                                {isEditing && (
                                    <div>
                                        <div className="grid-3">
                                            <div className="form-group">
                                                <label>ชื่อ</label>
                                                <input type="text" value={editVals.name} onChange={(e) => setEditVals({...editVals, name: e.target.value})} />
                                            </div>
                                            <div className="form-group">
                                                <label>หน่วย</label>
                                                <input type="text" value={editVals.unit} onChange={(e) => setEditVals({...editVals, unit: e.target.value})} />
                                            </div>
                                            <div className="form-group">
                                                <label>ราคา</label>
                                                <input type="number" value={editVals.price} onChange={(e) => setEditVals({...editVals, price: e.target.value})} />
                                            </div>
                                        </div>
                                        {locations.map(l => (
                                            <div key={l.id} style={{border: '1px solid var(--border)', borderRadius: '10px', padding: '10px', marginBottom: '10px'}}>
                                                <div className="form-group" style={{marginBottom: '10px'}}>
                                                    <label>จำนวนที่ 📍 {l.name}</label>
                                                    <input type="number" value={editVals.qtyByLoc[l.id]} onChange={(e) => setEditVals({...editVals, qtyByLoc: {...editVals.qtyByLoc, [l.id]: e.target.value}})} />
                                                </div>
                                                <div className="grid-2">
                                                    <div className="form-group">
                                                        <label>LOT (ถ้าเพิ่มจำนวน)</label>
                                                        <input type="text" value={editVals.lotByLoc[l.id]} onChange={(e) => setEditVals({...editVals, lotByLoc: {...editVals.lotByLoc, [l.id]: e.target.value}})} />
                                                    </div>
                                                    <div className="form-group">
                                                        <label>วันหมดอายุ (ถ้าเพิ่มจำนวน)</label>
                                                        <input type="date" value={editVals.expiryByLoc[l.id]} onChange={(e) => setEditVals({...editVals, expiryByLoc: {...editVals.expiryByLoc, [l.id]: e.target.value}})} />
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="row-actions">
                                            <button onClick={() => saveEdit(p)}>บันทึก</button>
                                            <button className="secondary" onClick={cancelEdit}>ยกเลิก</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        const UNASSIGNED = '__unassigned__';

        function BulkTransfer({ products, locations, stock, loadData, msg, msgType, flash, staffName }) {
            const [fromLoc, setFromLoc] = useState('');
            const [toLoc, setToLoc] = useState('');
            const [sel, setSel] = useState({});
            const [notes, setNotes] = useState('');
            const [search, setSearch] = useState('');
            const isUnassigned = fromLoc === UNASSIGNED;

            const stockedProductIds = new Set(stock.filter(s => parseFloat(s.quantity) > 0).map(s => s.product_id));
            const matchesSearch = (p) => !search || p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search);

            const rows = isUnassigned
                ? products.filter(p => !stockedProductIds.has(p.id)).filter(matchesSearch).slice(0, 100)
                    .map(p => ({ id: p.id, product_id: p.id, quantity: '', product: p }))
                : stock.filter(s => s.location_id === fromLoc && parseFloat(s.quantity) > 0)
                    .map(s => ({ ...s, product: products.find(p => p.id === s.product_id) }))
                    .filter(r => r.product && matchesSearch(r.product));

            const toggleAll = (checked) => {
                const next = {};
                if (checked) rows.forEach(r => { next[r.id] = { checked: true, qty: r.quantity }; });
                setSel(next);
            };

            const toggleRow = (r, checked) => {
                setSel({ ...sel, [r.id]: { checked, qty: sel[r.id]?.qty ?? r.quantity } });
            };

            const setQty = (r, qty) => {
                setSel({ ...sel, [r.id]: { checked: sel[r.id]?.checked ?? true, qty } });
            };

            const handle = async () => {
                if (!fromLoc || !toLoc) { flash('เลือกต้นทางและปลายทาง'); return; }
                if (fromLoc === toLoc) { flash('ต้นทางและปลายทางต้องไม่ใช่ที่เดียวกัน'); return; }
                const chosen = rows.filter(r => sel[r.id]?.checked && parseFloat(sel[r.id]?.qty) > 0);
                if (chosen.length === 0) { flash('เลือกสินค้าอย่างน้อย 1 รายการ และระบุจำนวน'); return; }
                if (!isUnassigned) {
                    for (const r of chosen) {
                        if (parseFloat(sel[r.id].qty) > parseFloat(r.quantity)) { flash('จำนวนที่ย้ายของ ' + r.product.name + ' เกินจำนวนที่มี'); return; }
                    }
                }
                try {
                    for (const r of chosen) {
                        const q = parseFloat(sel[r.id].qty);
                        if (!isUnassigned) {
                            const remaining = parseFloat(r.quantity) - q;
                            await client.from('product_location_stock').update({ quantity: remaining, updated_at: new Date().toISOString() }).eq('id', r.id);
                        }
                        const dest = stock.find(s => s.product_id === r.product_id && s.location_id === toLoc);
                        if (dest) {
                            await client.from('product_location_stock').update({ quantity: parseFloat(dest.quantity) + q, updated_at: new Date().toISOString() }).eq('id', dest.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: r.product_id, location_id: toLoc, quantity: q }]);
                        }
                        if (isUnassigned) {
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: toLoc, quantity_change: q, movement_type: 'receiving', notes: notes || 'กำหนดคลังเริ่มต้น', staff_name: staffName }]);
                        } else {
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: fromLoc, quantity_change: -q, movement_type: 'transfer', notes, staff_name: staffName }]);
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: toLoc, quantity_change: q, movement_type: 'transfer', notes, staff_name: staffName }]);
                        }
                    }
                    flash('บันทึกสำเร็จ (' + chosen.length + ' รายการ)', 'success');
                    setSel({}); setNotes('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const selectedCount = Object.values(sel).filter(s => s.checked).length;

            return (
                <div>
                    <h2>ย้ายคลัง (หลายรายการ)</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ต้นทาง</label>
                            <select value={fromLoc} onChange={(e) => { setFromLoc(e.target.value); setSel({}); setSearch(''); }}>
                                <option value="">-- เลือก --</option>
                                <option value={UNASSIGNED}>ยังไม่ระบุคลัง</option>
                                {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>ปลายทาง</label>
                            <select value={toLoc} onChange={(e) => setToLoc(e.target.value)}>
                                <option value="">-- เลือก --</option>
                                {locations.filter(l => l.id !== fromLoc).map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                            </select>
                        </div>
                    </div>
                    {fromLoc && (
                        <div>
                            <div className="form-group">
                                <label>ค้นหาสินค้า</label>
                                <input type="text" placeholder="รหัส/ชื่อ" value={search} onChange={(e) => setSearch(e.target.value)} />
                            </div>
                            <div className="row-actions" style={{marginBottom: '10px'}}>
                                <button className="small secondary" onClick={() => toggleAll(true)}>เลือกทั้งหมด</button>
                                <button className="small secondary" onClick={() => toggleAll(false)}>ยกเลิกทั้งหมด</button>
                                <span style={{fontSize: '12px', color: '#666', alignSelf: 'center'}}>เลือกแล้ว {selectedCount} รายการ</span>
                            </div>
                            <table>
                                <thead><tr><th></th><th>สินค้า</th><th>คงเหลือ</th><th>จำนวนที่ย้าย</th></tr></thead>
                                <tbody>
                                    {rows.map(r => (
                                        <tr key={r.id}>
                                            <td><input type="checkbox" style={{width: 'auto'}} checked={!!sel[r.id]?.checked} onChange={(e) => toggleRow(r, e.target.checked)} /></td>
                                            <td>{r.product.product_code} - {r.product.name}</td>
                                            <td>{isUnassigned ? '-' : r.quantity + ' ' + (r.product.unit || '')}</td>
                                            <td><input type="number" min="0" max={isUnassigned ? undefined : r.quantity} value={sel[r.id]?.qty ?? r.quantity} onChange={(e) => setQty(r, e.target.value)} disabled={!sel[r.id]?.checked} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {rows.length === 0 && <div style={{color: '#999', padding: '10px'}}>{isUnassigned ? 'ไม่พบสินค้าที่ยังไม่ระบุคลัง' : 'ที่อยู่นี้ไม่มีสต็อก'}</div>}
                            {isUnassigned && rows.length === 100 && <div style={{fontSize: '11px', color: '#999', marginTop: '5px'}}>แสดง 100 รายการแรก ใช้ช่องค้นหาเพื่อดูรายการอื่น</div>}
                        </div>
                    )}
                    <div className="form-group" style={{marginTop: '15px'}}>
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>
                    <button onClick={handle}>ยืนยันย้ายคลัง</button>
                </div>
            );
        }

        function ExpiryAlerts({ products, locations, lots }) {
            const [filter, setFilter] = useState('30');

            const rows = lots
                .map(l => ({ ...l, product: products.find(p => p.id === l.product_id), location: locations.find(x => x.id === l.location_id), days: l.expiry_date ? daysUntil(l.expiry_date) : null }))
                .filter(r => r.product && r.expiry_date)
                .filter(r => {
                    if (filter === 'all') return true;
                    if (filter === 'expired') return r.days < 0;
                    return r.days <= parseInt(filter);
                })
                .sort((a, b) => a.days - b.days);

            const statusOf = (days) => {
                if (days < 0) return { label: 'หมดอายุแล้ว', cls: 'badge-out' };
                if (days <= 7) return { label: 'อีก ' + days + ' วัน', cls: 'badge-out' };
                if (days <= 30) return { label: 'อีก ' + days + ' วัน', cls: 'badge-adj' };
                return { label: 'อีก ' + days + ' วัน', cls: 'badge-in' };
            };

            return (
                <div>
                    <h2>สินค้าใกล้หมดอายุ</h2>
                    <div className="form-group" style={{maxWidth: '250px'}}>
                        <label>ช่วงเวลา</label>
                        <select value={filter} onChange={(e) => setFilter(e.target.value)}>
                            <option value="7">ภายใน 7 วัน</option>
                            <option value="30">ภายใน 30 วัน</option>
                            <option value="90">ภายใน 90 วัน</option>
                            <option value="expired">หมดอายุแล้ว</option>
                            <option value="all">ทั้งหมด (ที่มี LOT)</option>
                        </select>
                    </div>
                    <table>
                        <thead><tr><th>สินค้า</th><th>ที่อยู่</th><th>LOT</th><th>วันหมดอายุ</th><th>จำนวน</th><th>สถานะ</th></tr></thead>
                        <tbody>
                            {rows.map(r => {
                                const s = statusOf(r.days);
                                return (
                                    <tr key={r.id}>
                                        <td>{r.product.product_code} - {r.product.name}</td>
                                        <td>{r.location ? r.location.name : '-'}</td>
                                        <td>{r.lot_number || '-'}</td>
                                        <td>{r.expiry_date}</td>
                                        <td>{r.quantity} {r.product.unit}</td>
                                        <td><span className={'badge ' + s.cls}>{s.label}</span></td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {rows.length === 0 && <div style={{color: '#999', padding: '20px', textAlign: 'center'}}>ไม่มีรายการในช่วงที่เลือก</div>}
                </div>
            );
        }

        function History({ products, locations, movements }) {
            const [filterType, setFilterType] = useState('');
            const filtered = filterType ? movements.filter(m => m.movement_type === filterType) : movements;
            return (
                <div>
                    <h2>ประวัติการเข้าออก</h2>
                    <div className="form-group" style={{maxWidth: '250px'}}>
                        <label>กรองตามประเภท</label>
                        <select value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                            <option value="">ทั้งหมด</option>
                            <option value="receiving">รับเข้า</option>
                            <option value="sale">ขายหน้าร้าน</option>
                            <option value="transfer">โอนสาขา</option>
                            <option value="adjustment">ปรับปรุง</option>
                        </select>
                    </div>
                    <table>
                        <thead>
                            <tr><th>วันที่</th><th>สินค้า</th><th>ที่อยู่</th><th>ประเภท</th><th>จำนวนที่เปลี่ยน</th><th>พนักงาน</th><th>หมายเหตุ</th></tr>
                        </thead>
                        <tbody>
                            {filtered.map(m => {
                                const p = products.find(x => x.id === m.product_id);
                                const l = locations.find(x => x.id === m.location_id);
                                const isOut = parseFloat(m.quantity_change) < 0;
                                return (
                                    <tr key={m.id}>
                                        <td>{new Date(m.created_at).toLocaleString('th-TH')}</td>
                                        <td>{p ? p.product_code + ' - ' + p.name : '-'}</td>
                                        <td>{l ? l.name : '-'}</td>
                                        <td><span className={'badge ' + (m.movement_type === 'adjustment' ? 'badge-adj' : (isOut ? 'badge-out' : 'badge-in'))}>{MOVEMENT_LABELS[m.movement_type] || m.movement_type}</span></td>
                                        <td style={{color: isOut ? '#721c24' : '#155724', fontWeight: 'bold'}}>{isOut ? '' : '+'}{m.quantity_change}</td>
                                        <td>{m.staff_name || '-'}</td>
                                        <td>{m.notes || '-'}</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {filtered.length === 0 && <div style={{color: '#999', padding: '20px', textAlign: 'center'}}>ไม่มีรายการ</div>}
                </div>
            );
        }

        function Locations({ locations, loadData, msg, msgType, flash }) {
            const [name, setName] = useState('');
            const [addr, setAddr] = useState('');
            const [editId, setEditId] = useState(null);
            const [editVals, setEditVals] = useState({ name: '', address: '' });

            const add = async () => {
                if (!name.trim()) { flash('ระบุชื่อ'); return; }
                try {
                    await client.from('storage_locations').insert([{ name, address: addr }]);
                    flash('เพิ่มสำเร็จ', 'success');
                    setName(''); setAddr('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const startEdit = (l) => { setEditId(l.id); setEditVals({ name: l.name, address: l.address || '' }); };
            const cancelEdit = () => { setEditId(null); setEditVals({ name: '', address: '' }); };

            const saveEdit = async (l) => {
                if (!editVals.name.trim()) { flash('ระบุชื่อ'); return; }
                try {
                    await client.from('storage_locations').update({ name: editVals.name, address: editVals.address }).eq('id', l.id);
                    flash('บันทึกสำเร็จ', 'success');
                    cancelEdit();
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const remove = async (l) => {
                if (!confirm('ลบที่อยู่ "' + l.name + '" ใช่หรือไม่?')) return;
                try {
                    const { error } = await client.from('storage_locations').delete().eq('id', l.id);
                    if (error) throw error;
                    flash('ลบสำเร็จ', 'success');
                    await loadData();
                } catch (err) {
                    flash('ลบไม่ได้ เนื่องจากที่อยู่นี้มีข้อมูลสต็อกหรือประวัติผูกอยู่', 'error');
                }
            };

            return (
                <div>
                    <h2>จัดการที่อยู่</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ชื่อที่อยู่</label>
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>ที่อยู่</label>
                            <input type="text" value={addr} onChange={(e) => setAddr(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={add}>เพิ่มที่อยู่</button>
                    <h3 style={{marginTop: '25px'}}>ที่อยู่ทั้งหมด</h3>
                    {locations.map(l => (
                        <div key={l.id} className="card">
                            {editId === l.id ? (
                                <div>
                                    <div className="grid-2">
                                        <div className="form-group">
                                            <label>ชื่อที่อยู่</label>
                                            <input type="text" value={editVals.name} onChange={(e) => setEditVals({...editVals, name: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>ที่อยู่</label>
                                            <input type="text" value={editVals.address} onChange={(e) => setEditVals({...editVals, address: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="row-actions">
                                        <button onClick={() => saveEdit(l)}>บันทึก</button>
                                        <button className="secondary" onClick={cancelEdit}>ยกเลิก</button>
                                    </div>
                                </div>
                            ) : (
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <div>
                                        <strong>{l.name}</strong>
                                        <div style={{fontSize: '12px', color: '#666'}}>{l.address}</div>
                                    </div>
                                    <div className="row-actions">
                                        <button className="small secondary" onClick={() => startEdit(l)}>แก้ไข</button>
                                        <button className="small danger" onClick={() => remove(l)}>ลบ</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function Login({ onLogin }) {
            const [staffList, setStaffList] = useState([]);
            const [loadingStaff, setLoadingStaff] = useState(true);
            const [selectedId, setSelectedId] = useState('');
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');

            useEffect(() => {
                client.from('staff').select('*').eq('active', true).order('name').then(({ data }) => {
                    setStaffList(data || []);
                    setLoadingStaff(false);
                });
            }, []);

            const submit = () => {
                setError('');
                const staff = staffList.find(s => s.id === selectedId);
                if (!staff) { setError('เลือกชื่อพนักงาน'); return; }
                if (!pin || staff.pin_code !== pin) { setError('รหัสไม่ถูกต้อง'); return; }
                sessionStorage.setItem('warehouse_staff', JSON.stringify({ id: staff.id, name: staff.name }));
                onLogin({ id: staff.id, name: staff.name });
            };

            return (
                <div style={{minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                    <div style={{maxWidth: '380px', width: '100%', background: 'var(--card)', borderRadius: '20px', padding: '32px', boxShadow: '0 1px 3px rgba(30,34,51,0.04), 0 12px 32px -12px rgba(30,34,51,0.10)'}}>
                        <div className="app-header" style={{marginBottom: '22px'}}>
                            <div className="logo-badge"><IconLogo /></div>
                            <div>
                                <h1>ระบบจัดการคลังสินค้า</h1>
                                <div className="app-subtitle">เข้าสู่ระบบพนักงาน</div>
                            </div>
                        </div>
                        {error && <div className="alert alert-error">{error}</div>}
                        <div className="form-group">
                            <label>ชื่อพนักงาน</label>
                            <select value={selectedId} onChange={(e) => setSelectedId(e.target.value)}>
                                <option value="">-- เลือก --</option>
                                {staffList.map(s => (<option key={s.id} value={s.id}>{s.name}</option>))}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>รหัสผ่าน (PIN)</label>
                            <input type="password" inputMode="numeric" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') submit(); }} />
                        </div>
                        <button onClick={submit} style={{width: '100%'}}>เข้าสู่ระบบ</button>
                        {!loadingStaff && staffList.length === 0 && <div style={{fontSize: '12px', color: 'var(--text-muted)', marginTop: '14px'}}>ยังไม่มีรายชื่อพนักงานในระบบ กรุณาติดต่อผู้ดูแลระบบ</div>}
                    </div>
                </div>
            );
        }

        function StaffManagement({ staff, loadData, msg, msgType, flash }) {
            const [name, setName] = useState('');
            const [pinCode, setPinCode] = useState('');
            const [editId, setEditId] = useState(null);
            const [editVals, setEditVals] = useState({ name: '', pin_code: '', active: true });

            const add = async () => {
                if (!name.trim() || !pinCode.trim()) { flash('กรอกชื่อและรหัสผ่าน'); return; }
                try {
                    await client.from('staff').insert([{ name, pin_code: pinCode }]);
                    flash('เพิ่มพนักงานสำเร็จ', 'success');
                    setName(''); setPinCode('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const startEdit = (s) => { setEditId(s.id); setEditVals({ name: s.name, pin_code: s.pin_code, active: s.active }); };
            const cancelEdit = () => { setEditId(null); setEditVals({ name: '', pin_code: '', active: true }); };

            const saveEdit = async (s) => {
                if (!editVals.name.trim() || !editVals.pin_code.trim()) { flash('กรอกชื่อและรหัสผ่าน'); return; }
                try {
                    await client.from('staff').update({ name: editVals.name, pin_code: editVals.pin_code, active: editVals.active }).eq('id', s.id);
                    flash('บันทึกสำเร็จ', 'success');
                    cancelEdit();
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const remove = async (s) => {
                if (!confirm('ลบพนักงาน "' + s.name + '" ใช่หรือไม่?')) return;
                try {
                    const { error } = await client.from('staff').delete().eq('id', s.id);
                    if (error) throw error;
                    flash('ลบสำเร็จ', 'success');
                    await loadData();
                } catch (err) {
                    flash('ลบไม่ได้ อาจมีประวัติการทำงานผูกอยู่กับพนักงานคนนี้', 'error');
                }
            };

            return (
                <div>
                    <h2>จัดการพนักงาน</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ชื่อพนักงาน</label>
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>รหัสผ่าน (PIN)</label>
                            <input type="text" value={pinCode} onChange={(e) => setPinCode(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={add}>เพิ่มพนักงาน</button>
                    <h3 style={{marginTop: '25px'}}>พนักงานทั้งหมด</h3>
                    {staff.map(s => (
                        <div key={s.id} className="card">
                            {editId === s.id ? (
                                <div>
                                    <div className="grid-2">
                                        <div className="form-group">
                                            <label>ชื่อพนักงาน</label>
                                            <input type="text" value={editVals.name} onChange={(e) => setEditVals({...editVals, name: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>รหัสผ่าน (PIN)</label>
                                            <input type="text" value={editVals.pin_code} onChange={(e) => setEditVals({...editVals, pin_code: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label style={{display: 'flex', alignItems: 'center', gap: '6px'}}>
                                            <input type="checkbox" style={{width: 'auto'}} checked={editVals.active} onChange={(e) => setEditVals({...editVals, active: e.target.checked})} />
                                            ใช้งานอยู่
                                        </label>
                                    </div>
                                    <div className="row-actions">
                                        <button onClick={() => saveEdit(s)}>บันทึก</button>
                                        <button className="secondary" onClick={cancelEdit}>ยกเลิก</button>
                                    </div>
                                </div>
                            ) : (
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <div>
                                        <strong>{s.name}</strong>
                                        {!s.active && <span className="badge badge-out" style={{marginLeft: '8px'}}>ปิดใช้งาน</span>}
                                        <div style={{fontSize: '12px', color: 'var(--text-muted)'}}>PIN: {s.pin_code}</div>
                                    </div>
                                    <div className="row-actions">
                                        <button className="small secondary" onClick={() => startEdit(s)}>แก้ไข</button>
                                        <button className="small danger" onClick={() => remove(s)}>ลบ</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                    {staff.length === 0 && <div style={{color: 'var(--text-muted)'}}>ยังไม่มีพนักงาน</div>}
                </div>
            );
        }

        function App() {
            const [currentStaff, setCurrentStaff] = useState(() => {
                try { return JSON.parse(sessionStorage.getItem('warehouse_staff')); } catch { return null; }
            });
            const [tab, setTab] = useState('home');
            const [products, setProducts] = useState([]);
            const [locations, setLocations] = useState([]);
            const [stock, setStock] = useState([]);
            const [movements, setMovements] = useState([]);
            const [lots, setLots] = useState([]);
            const [staff, setStaff] = useState([]);
            const [loading, setLoading] = useState(true);
            const [msg, setMsg] = useState('');
            const [msgType, setMsgType] = useState('error');

            useEffect(() => { loadData(); }, []);

            const flash = (text, type) => {
                setMsg(text);
                setMsgType(type || 'error');
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    let allProds = [];
                    for (let i = 0; i < 5; i++) {
                        const from = i * 1000;
                        const to = from + 999;
                        const res = await client.from('products').select('*').range(from, to);
                        if (res.data && res.data.length > 0) {
                            allProds = allProds.concat(res.data);
                        }
                        if (!res.data || res.data.length < 1000) break;
                    }
                    const [locRes, stockRes, movRes, lotRes, staffRes] = await Promise.all([
                        client.from('storage_locations').select('*'),
                        client.from('product_location_stock').select('*').limit(10000),
                        client.from('stock_movements').select('*').order('created_at', { ascending: false }).limit(300),
                        client.from('stock_lots').select('*').gt('quantity', 0).order('expiry_date', { ascending: true }).limit(2000),
                        client.from('staff').select('*').order('name')
                    ]);
                    setProducts(allProds);
                    setLocations(locRes.data || []);
                    setStock(stockRes.data || []);
                    setMovements(movRes.data || []);
                    setLots(lotRes.data || []);
                    setStaff(staffRes.data || []);
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
                setLoading(false);
            };

            if (!currentStaff) return <Login onLogin={setCurrentStaff} />;
            if (loading) return <div className="container"><div className="loading">กำลังโหลด...</div></div>;

            const logout = () => {
                sessionStorage.removeItem('warehouse_staff');
                setCurrentStaff(null);
            };

            const shared = { products, locations, stock, movements, lots, staff, loadData, msg, msgType, flash, staffName: currentStaff.name };
            const soonCount = lots.filter(l => l.expiry_date && daysUntil(l.expiry_date) <= 30).length;

            return (
                <div className="container">
                    <div className="sidebar">
                        <div className="app-header">
                            <div className="logo-badge"><IconLogo /></div>
                            <div>
                                <h1>ระบบจัดการคลังสินค้า</h1>
                                <div className="app-subtitle">บริหารสต็อกแบบเรียลไทม์</div>
                            </div>
                        </div>
                        <div className="nav-tabs">
                            <button className={'nav-tab ' + (tab === 'home' ? 'active' : '')} onClick={() => { setTab('home'); setMsg(''); }}><IconHome />หน้าแรก</button>
                            <button className={'nav-tab ' + (tab === 'receiving' ? 'active' : '')} onClick={() => { setTab('receiving'); setMsg(''); }}><IconIn />รับเข้า</button>
                            <button className={'nav-tab ' + (tab === 'issue' ? 'active' : '')} onClick={() => { setTab('issue'); setMsg(''); }}><IconOut />เบิกออก</button>
                            <button className={'nav-tab ' + (tab === 'warehouse' ? 'active' : '')} onClick={() => { setTab('warehouse'); setMsg(''); }}><IconBox />คลังสินค้า</button>
                            <button className={'nav-tab ' + (tab === 'transfer' ? 'active' : '')} onClick={() => { setTab('transfer'); setMsg(''); }}><IconSwap />ย้ายคลัง</button>
                            <button className={'nav-tab ' + (tab === 'expiry' ? 'active' : '')} onClick={() => { setTab('expiry'); setMsg(''); }}><IconAlert />ใกล้หมดอายุ{soonCount > 0 ? ' (' + soonCount + ')' : ''}</button>
                            <button className={'nav-tab ' + (tab === 'history' ? 'active' : '')} onClick={() => { setTab('history'); setMsg(''); }}><IconHistory />ประวัติ</button>
                            <button className={'nav-tab ' + (tab === 'locations' ? 'active' : '')} onClick={() => { setTab('locations'); setMsg(''); }}><IconPin />ที่อยู่</button>
                            <button className={'nav-tab ' + (tab === 'staff' ? 'active' : '')} onClick={() => { setTab('staff'); setMsg(''); }}><IconUser />พนักงาน</button>
                        </div>
                        <div style={{marginTop: 'auto', paddingTop: '16px', borderTop: '1px solid var(--border)'}}>
                            <div style={{fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px', padding: '0 6px'}}>เข้าสู่ระบบ: <strong style={{color: 'var(--text)'}}>{currentStaff.name}</strong></div>
                            <button className="secondary small" style={{width: '100%'}} onClick={logout}>ออกจากระบบ</button>
                        </div>
                    </div>
                    <div className="main-content">
                        {tab === 'home' && <Home {...shared} />}
                        {tab === 'receiving' && <Receiving {...shared} />}
                        {tab === 'issue' && <IssueStock {...shared} />}
                        {tab === 'warehouse' && <Warehouse {...shared} />}
                        {tab === 'transfer' && <BulkTransfer {...shared} />}
                        {tab === 'expiry' && <ExpiryAlerts {...shared} />}
                        {tab === 'history' && <History {...shared} />}
                        {tab === 'locations' && <Locations {...shared} />}
                        {tab === 'staff' && <StaffManagement {...shared} />}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
