                if (!byProduct[r.product_id]) byProduct[r.product_id] = { product: r.product, qty: 0, total: 0 };
                byProduct[r.product_id].qty += r.qty;
                byProduct[r.product_id].total += r.total;
            });
            const top10 = Object.values(byProduct).sort((a, b) => b.qty - a.qty).slice(0, 10);

            const bySupplier = {};
            filteredRows.forEach(r => {
                const key = r.receipt.supplier_name || 'ไม่ระบุ';
                bySupplier[key] = (bySupplier[key] || 0) + r.total;
            });
            const supplierRows = Object.entries(bySupplier).sort((a, b) => b[1] - a[1]);

            const byMonth = {};
            filteredRows.forEach(r => {
                const m = r.receipt.receipt_date?.slice(0, 7);
                if (!m) return;
                byMonth[m] = (byMonth[m] || 0) + r.total;
            });
            const monthRows = Object.entries(byMonth).sort((a, b) => b[0].localeCompare(a[0]));

            return (
                <div>
                    <h2>สถิติการสั่งซื้อ</h2>
                    <div className="grid-2" style={{marginBottom: '15px'}}>
                        <div className="form-group">
                            <label>กรองตามผู้ขาย/ซัพพลายเออร์</label>
                            <select value={supplierFilter} onChange={(e) => setSupplierFilter(e.target.value)}>
                                <option value="">ทั้งหมด</option>
                                {supplierNames.map(s => (<option key={s} value={s}>{s}</option>))}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>กรองตามเดือน</label>
                            <select value={monthFilter} onChange={(e) => setMonthFilter(e.target.value)}>
                                <option value="">ทั้งหมด</option>
                                {months.map(m => (<option key={m} value={m}>{formatMonthYm(m)}</option>))}
                            </select>
                        </div>
                    </div>

                    <div className="card" style={{textAlign: 'center', marginBottom: '20px'}}>
                        <div style={{fontSize: '13px', color: 'var(--text-muted)'}}>
                            ยอดซื้อรวม{supplierFilter ? ' จาก ' + supplierFilter : ''}{monthFilter ? ' เดือน ' + formatMonthYm(monthFilter) : ''}
                        </div>
                        <div style={{fontSize: '28px', fontWeight: 700}}>{formatBaht(grandTotal)}</div>
                        <div style={{fontSize: '12px', color: 'var(--text-muted)'}}>{filteredRows.length} รายการสินค้า จาก {receiptCount} ใบรับสินค้า</div>
                    </div>

                    <h3 style={{marginBottom: '10px'}}>Top 10 สินค้าที่สั่งซื้อมากที่สุด (ตามจำนวน)</h3>
                    <table>
                        <thead><tr><th>อันดับ</th><th>สินค้า</th><th>จำนวนรวม</th><th>มูลค่ารวม</th></tr></thead>
                        <tbody>
                            {top10.map((r, i) => (
                                <tr key={i}>
                                    <td>{i + 1}</td>
                                    <td>{r.product ? r.product.product_code + ' - ' + r.product.name : '-'}</td>
                                    <td>{r.qty.toFixed(0)} {r.product?.unit || ''}</td>
                                    <td>{formatBaht(r.total)}</td>
                                </tr>
                            ))}
                            {top10.length === 0 && (<tr><td colSpan="4" style={{textAlign: 'center', color: 'var(--text-muted)'}}>ไม่มีข้อมูล</td></tr>)}
                        </tbody>
                    </table>

                    <h3 style={{margin: '20px 0 10px'}}>ยอดซื้อรายเดือน</h3>
                    <table>
                        <thead><tr><th>เดือน</th><th>ยอดซื้อรวม</th></tr></thead>
                        <tbody>
                            {monthRows.map(([m, total]) => (<tr key={m}><td>{formatMonthYm(m)}</td><td>{formatBaht(total)}</td></tr>))}
                            {monthRows.length === 0 && (<tr><td colSpan="2" style={{textAlign: 'center', color: 'var(--text-muted)'}}>ไม่มีข้อมูล</td></tr>)}
                        </tbody>
                    </table>

                    {!supplierFilter && (
                        <>
                            <h3 style={{margin: '20px 0 10px'}}>ยอดซื้อแยกตามผู้ขาย/ซัพพลายเออร์</h3>
                            <table>
                                <thead><tr><th>ผู้ขาย/ซัพพลายเออร์</th><th>ยอดซื้อรวม</th></tr></thead>
                                <tbody>
                                    {supplierRows.map(([s, total]) => (<tr key={s}><td>{s}</td><td>{formatBaht(total)}</td></tr>))}
                                    {supplierRows.length === 0 && (<tr><td colSpan="2" style={{textAlign: 'center', color: 'var(--text-muted)'}}>ไม่มีข้อมูล</td></tr>)}
                                </tbody>
                            </table>
                        </>
                    )}
                </div>
            );
        }

        function Warehouse({ products, locations, stock, suppliers, loadData, msg, msgType, flash, staffName, isAdmin }) {
            const [search, setSearch] = useState('');
            const [locFilter, setLocFilter] = useState('');
            const [expandedInfo, setExpandedInfo] = useState({});
            const [editId, setEditId] = useState(null);
            const [editMode, setEditMode] = useState('full');
            const [editVals, setEditVals] = useState({});
            const [showAdd, setShowAdd] = useState(false);
            const [displayLimit, setDisplayLimit] = useState(50);
            const [newProd, setNewProd] = useState({ code: '', name: '', unit: '', price: '', cost: '', wholesalePrice: '', category: '', company: '', packUnit: '', packSize: '', activeIngredient: '', usageInfo: '', restrictions: '' });
            const companyOptions = [...new Set(products.map(p => p.company).filter(Boolean))].sort();
            const matchesSearch = (p) =>
                p.product_code?.includes(search.toUpperCase()) ||
                p.name?.includes(search) ||
                p.company?.includes(search) ||
                p.category?.includes(search) ||
                p.active_ingredient?.includes(search) ||
                p.usage_info?.includes(search);
            const allFiltered = (locFilter
                ? products.filter(p => stock.some(s => s.product_id === p.id && s.location_id === locFilter && parseFloat(s.quantity) > 0))
                : products
            ).filter(matchesSearch);
            const filtered = allFiltered.slice(0, displayLimit);
            useEffect(() => { setDisplayLimit(50); }, [search, locFilter]);

            const syncSupplier = async (name) => {
                if (!name) return;
                if (!suppliers.some(s => s.name === name)) {
                    await client.from('suppliers').insert([{ name }]).select().then(() => {}, () => {});
                }
            };

            const addProduct = async () => {
                if (!newProd.code.trim() || !newProd.name.trim()) { flash('กรอกรหัสสินค้าและชื่อสินค้า'); return; }
                if (products.some(p => p.product_code?.toUpperCase() === newProd.code.trim().toUpperCase())) {
                    flash('รหัสสินค้า "' + newProd.code + '" มีอยู่แล้ว'); return;
                }
                try {
                    await syncSupplier(newProd.company.trim());
                    const payload = {
                        product_code: newProd.code.trim(),
                        name: newProd.name.trim(),
                        unit: newProd.unit.trim() || null,
                        price: newProd.price === '' ? null : parseFloat(newProd.price),
                        category: newProd.category.trim() || null,
                        company: newProd.company.trim() || null,
                        pack_unit: newProd.packUnit.trim() || null,
                        pack_size: newProd.packSize === '' ? null : parseFloat(newProd.packSize),
                        active_ingredient: newProd.activeIngredient.trim() || null,
                        usage_info: newProd.usageInfo.trim() || null,
                        restrictions: newProd.restrictions.trim() || null
                    };
                    if (isAdmin) {
                        payload.cost = newProd.cost === '' ? null : parseFloat(newProd.cost);
                        payload.wholesale_price = newProd.wholesalePrice === '' ? null : parseFloat(newProd.wholesalePrice);
                    }
                    await client.from('products').insert([payload]);
                    flash('เพิ่มสินค้าใหม่สำเร็จ', 'success');
                    setNewProd({ code: '', name: '', unit: '', price: '', cost: '', wholesalePrice: '', category: '', company: '', packUnit: '', packSize: '', activeIngredient: '', usageInfo: '', restrictions: '' });
                    setShowAdd(false);
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const startEdit = (p) => {
                const ps = stock.filter(s => s.product_id === p.id);
                const qtyByLoc = {};
                const lotByLoc = {};
                const expiryByLoc = {};
                locations.forEach(l => {
                    const s = ps.find(x => x.location_id === l.id);
                    qtyByLoc[l.id] = s ? s.quantity : 0;
                    lotByLoc[l.id] = '';
                    expiryByLoc[l.id] = '';
                });
                setEditId(p.id);
                setEditVals({
                    name: p.name, unit: p.unit || '', price: p.price || '', cost: p.cost || '', wholesalePrice: p.wholesale_price || '',
                    packUnit: p.pack_unit || '', packSize: p.pack_size || '', category: p.category || '', company: p.company || '',
                    activeIngredient: p.active_ingredient || '', usageInfo: p.usage_info || '', restrictions: p.restrictions || '',
                    qtyByLoc, lotByLoc, expiryByLoc
                });
            };

            const cancelEdit = () => { setEditId(null); setEditVals({}); setEditMode('full'); };

            const saveEdit = async (p) => {
                try {
                    await syncSupplier(editVals.company.trim());
                    const payload = {
                        name: editVals.name, unit: editVals.unit, price: editVals.price === '' ? null : parseFloat(editVals.price),
                        pack_unit: editVals.packUnit.trim() || null, pack_size: editVals.packSize === '' ? null : parseFloat(editVals.packSize),
                        category: editVals.category.trim() || null, company: editVals.company.trim() || null,
                        active_ingredient: editVals.activeIngredient.trim() || null, usage_info: editVals.usageInfo.trim() || null,
                        restrictions: editVals.restrictions.trim() || null
                    };
                    if (isAdmin) {
                        payload.cost = editVals.cost === '' ? null : parseFloat(editVals.cost);
                        payload.wholesale_price = editVals.wholesalePrice === '' ? null : parseFloat(editVals.wholesalePrice);
                    }
                    await client.from('products').update(payload).eq('id', p.id);
                    const ps = stock.filter(s => s.product_id === p.id);
                    for (const l of locations) {
                        const s = ps.find(x => x.location_id === l.id);
                        const newQty = parseFloat(editVals.qtyByLoc[l.id]);
                        const oldQty = s ? parseFloat(s.quantity) : 0;
                        if (isNaN(newQty) || newQty === oldQty) continue;
                        if (s) {
                            await client.from('product_location_stock').update({ quantity: newQty, updated_at: new Date().toISOString() }).eq('id', s.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: p.id, location_id: l.id, quantity: newQty }]);
                        }
                        await client.from('stock_movements').insert([{ product_id: p.id, location_id: l.id, quantity_change: newQty - oldQty, movement_type: 'adjustment', notes: 'แก้ไขจากหน้าคลังสินค้า', staff_name: staffName }]);
                        const lot = editVals.lotByLoc[l.id];
                        const expiry = editVals.expiryByLoc[l.id];
                        if (newQty > oldQty && (lot || expiry)) {
                            await client.from('stock_lots').insert([{ product_id: p.id, location_id: l.id, lot_number: lot || null, expiry_date: expiry || null, quantity: newQty - oldQty, notes: 'แก้ไขจากหน้าคลังสินค้า' }]);
                        }
                    }
                    flash('บันทึกการแก้ไขสำเร็จ', 'success');
                    cancelEdit();
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const deleteProduct = async (p) => {
                if (!confirm('ลบสินค้า "' + p.name + '" ใช่หรือไม่? การลบไม่สามารถย้อนกลับได้')) return;
                try {
                    const { error } = await client.from('products').delete().eq('id', p.id);
                    if (error) throw error;
                    flash('ลบสินค้าสำเร็จ', 'success');
                    await loadData();
                } catch (err) {
                    flash('ลบไม่ได้ เนื่องจากสินค้านี้มีประวัติรับเข้า/สั่งซื้อ/LOT ผูกอยู่', 'error');
                }
            };

            return (
                <div>
                    <h2>คลังสินค้า</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="row-actions" style={{marginBottom: '15px'}}>
                        <button className="secondary small" onClick={() => setShowAdd(!showAdd)}>{showAdd ? 'ยกเลิก' : '+ เพิ่มสินค้าใหม่'}</button>
                    </div>
                    {showAdd && (
                        <div className="card" style={{border: '1.5px solid var(--primary)'}}>
                            <div className="grid-3">
                                <div className="form-group">
                                    <label>รหัสสินค้า</label>
                                    <input type="text" value={newProd.code} onChange={(e) => setNewProd({...newProd, code: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label>ชื่อสินค้า</label>
                                    <input type="text" value={newProd.name} onChange={(e) => setNewProd({...newProd, name: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label>หน่วย</label>
                                    <UnitInput value={newProd.unit} onChange={(v) => setNewProd({...newProd, unit: v})} options={BASE_UNITS} placeholder="-- เลือกหน่วย --" />
                                </div>
                            </div>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label>ราคา</label>
                                    <input type="number" value={newProd.price} onChange={(e) => setNewProd({...newProd, price: e.target.value})} />
                                </div>
                                <div className="form-group">
                                    <label>หมวดหมู่ (ถ้ามี)</label>
                                    <input type="text" value={newProd.category} onChange={(e) => setNewProd({...newProd, category: e.target.value})} />
                                </div>
                            </div>
                            <div className="form-group">
                                <label>บริษัท/แบรนด์ (ถ้ามี)</label>
                                <UnitInput value={newProd.company} onChange={(v) => setNewProd({...newProd, company: v})} options={companyOptions} placeholder="-- เลือกบริษัท/แบรนด์ --" />
                            </div>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label>หน่วยที่รับจากผู้ผลิต (ถ้ามี)</label>
                                    <UnitInput value={newProd.packUnit} onChange={(v) => setNewProd({...newProd, packUnit: v})} options={PACK_UNITS} placeholder="-- เลือกหน่วย --" />
                                </div>
                                <div className="form-group">
                                    <label>จำนวนหน่วยต่อแพ็ค</label>
                                    <input type="number" min="1" value={newProd.packSize} onChange={(e) => setNewProd({...newProd, packSize: e.target.value})} />
                                </div>
                            </div>
                            <div className="form-group">
                                <label>สารเคมี/สารออกฤทธิ์ (ถ้ามี)</label>
                                <input type="text" value={newProd.activeIngredient} onChange={(e) => setNewProd({...newProd, activeIngredient: e.target.value})} />
                            </div>
                            <div className="form-group">
                                <label>สรรพคุณ / ใช้รักษา-กำจัดอะไร (ถ้ามี)</label>
                                <textarea value={newProd.usageInfo} onChange={(e) => setNewProd({...newProd, usageInfo: e.target.value})} rows="2"></textarea>
                            </div>
                            <div className="form-group">
                                <label>ข้อจำกัดการใช้ (ถ้ามี)</label>
                                <textarea value={newProd.restrictions} onChange={(e) => setNewProd({...newProd, restrictions: e.target.value})} rows="2"></textarea>
                            </div>
                            {isAdmin && (
                                <div className="grid-2">
                                    <div className="form-group">
                                        <label>ราคาทุน</label>
                                        <input type="number" value={newProd.cost} onChange={(e) => setNewProd({...newProd, cost: e.target.value})} />
                                    </div>
                                    <div className="form-group">
                                        <label>ราคาส่ง</label>
                                        <input type="number" value={newProd.wholesalePrice} onChange={(e) => setNewProd({...newProd, wholesalePrice: e.target.value})} />
                                    </div>
                                </div>
                            )}
                            <button onClick={addProduct}>บันทึกสินค้าใหม่</button>
                        </div>
                    )}
                    <div className="grid-2" style={{marginBottom: '15px'}}>
                        <input type="text" placeholder="ค้นหา (ชื่อ/รหัส/บริษัท/หมวดหมู่)..." value={search} onChange={(e) => setSearch(e.target.value)} />
                        <select value={locFilter} onChange={(e) => setLocFilter(e.target.value)}>
                            <option value="">ทุกสถานที่</option>
                            {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                        </select>
                    </div>
                    <div style={{overflowX: 'auto'}}>
                        <table>
                            <thead>
                                <tr>
                                    <th>สินค้า</th><th>บริษัท</th><th>หมวดหมู่</th><th>{locFilter ? 'คงเหลือ' : 'คงเหลือรวม'}</th><th>หน่วย</th><th>ราคา</th><th>รายละเอียดสถานที่</th><th style={{position: 'sticky', right: 0, background: 'var(--card, #fff)', boxShadow: '-2px 0 4px rgba(0,0,0,0.08)'}}>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.map(p => {
                                    const ps = stock.filter(s => s.product_id === p.id && (!locFilter || s.location_id === locFilter));
                                    const tot = ps.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
                                    const stockedLocs = ps.filter(s => parseFloat(s.quantity) > 0);
                                    const isEditing = editId === p.id;
                                    return (
                                        <React.Fragment key={p.id}>
                                            <tr>
                                                <td>
                                                    <strong>{p.product_code}</strong><br />{p.name}
                                                    {p.pack_unit && p.pack_size ? <div style={{fontSize: '11px', color: 'var(--text-muted)'}}>หน่วยบรรจุ: {formatUnit(p)}</div> : null}
                                                    {p.active_ingredient ? (
                                                        <span className="badge" style={{background: '#e1f0ff', color: '#0b5394', marginTop: '4px', display: 'inline-block'}} title={'สารเดียวกัน (ใช้แทนกันได้): ' + p.active_ingredient}>
                                                            🧪 {p.active_ingredient}
                                                        </span>
                                                    ) : null}
                                                    {p.restrictions ? (
                                                        <span className="badge" style={{background: '#fdecea', color: '#c0392b', marginTop: '4px', marginLeft: '4px', display: 'inline-block'}} title={'ข้อจำกัดการใช้: ' + p.restrictions}>
                                                            ⚠️ มีข้อจำกัดการใช้
                                                        </span>
                                                    ) : null}
                                                    {(p.usage_info || p.restrictions) ? (
                                                        expandedInfo[p.id] ? (
                                                            <div style={{fontSize: '11px', color: 'var(--text-muted)', whiteSpace: 'pre-line', cursor: 'pointer', marginTop: '4px'}} onClick={() => setExpandedInfo({...expandedInfo, [p.id]: false})}>
                                                                {p.usage_info ? <div>สรรพคุณ: {p.usage_info}</div> : null}
                                                                {p.restrictions ? <div style={{color: '#c0392b'}}>⚠️ ข้อจำกัดการใช้: {p.restrictions}</div> : null}
                                                            </div>
                                                        ) : (
                                                            <div style={{fontSize: '11px', color: 'var(--primary)', cursor: 'pointer', marginTop: '4px'}} title={[p.usage_info, p.restrictions].filter(Boolean).join('\n\n')} onClick={() => setExpandedInfo({...expandedInfo, [p.id]: true})}>

                                                </td>

                                                <td>

                                                    {stockedLocs.map(s => {

                                                        return (<div key={s.id} style={{fontSize: '12px'}}>{l ? l.name : '-'}: <strong>{s.quantity}</strong></div>);

                                                </td>
                                                <td style={{position: 'sticky', right: 0, background: 'var(--card, #fff)', boxShadow: '-2px 0 4px rgba(0,0,0,0.08)'}}>
                                                    <div className="row-actions" style={{flexWrap: 'wrap'}}>
                                                        <button className="small" style={{background: '#17a2b8', color: 'white'}} onClick={() => { startEdit(p); setEditMode('quick'); }}>จำนวน</button>
                                                        <button className="small secondary" onClick={() => { startEdit(p); setEditMode('full'); }}>แก้ไข</button>
                                                        <button className="small danger" onClick={() => deleteProduct(p)}>ลบ</button>
                                                    </div>
                                                </td>
                                            </tr>
                                            {isEditing && (
                                                <tr>
                                                    <td colSpan="8">
                                                        <h3 style={{marginBottom: '10px'}}>{editMode === 'quick' ? 'แก้ไขจำนวนสต็อก (ด่วน)' : 'แก้ไขสินค้า'}</h3>
                                                        {editMode === 'full' && (<>
                                                        <div className="grid-3">
                                                            <div className="form-group">
                                                                <label>ชื่อ</label>
                                                                <input type="text" value={editVals.name} onChange={(e) => setEditVals({...editVals, name: e.target.value})} />
                                                            </div>
                                                            <div className="form-group">
                                                                <label>หน่วย</label>
                                                                <UnitInput value={editVals.unit} onChange={(v) => setEditVals({...editVals, unit: v})} options={BASE_UNITS} placeholder="-- เลือกหน่วย --" />
                                                            </div>
                                                            <div className="form-group">
                                                                <label>ราคา</label>
                                                                <input type="number" value={editVals.price} onChange={(e) => setEditVals({...editVals, price: e.target.value})} />
                                                            </div>
                                                        </div>
                                                        <div className="grid-2">
                                                            <div className="form-group">
                                                                <label>หน่วยที่รับจากผู้ผลิต (ถ้ามี)</label>
                                                                <UnitInput value={editVals.packUnit} onChange={(v) => setEditVals({...editVals, packUnit: v})} options={PACK_UNITS} placeholder="-- เลือกหน่วย --" />
                                                            </div>
                                                            <div className="form-group">
                                                                <label>จำนวนหน่วยต่อแพ็ค</label>
                                                                <input type="number" min="1" value={editVals.packSize} onChange={(e) => setEditVals({...editVals, packSize: e.target.value})} />
                                                            </div>
                                                        </div>
                                                        <div className="grid-2">
                                                            <div className="form-group">
                                                                <label>หมวดหมู่</label>
                                                                <input type="text" value={editVals.category} onChange={(e) => setEditVals({...editVals, category: e.target.value})} />
                                                            </div>
                                                            <div className="form-group">
                                                                <label>บริษัท/แบรนด์</label>
                                                                <UnitInput value={editVals.company} onChange={(v) => setEditVals({...editVals, company: v})} options={companyOptions} placeholder="-- เลือกบริษัท/แบรนด์ --" />
                                                            </div>
                                                        </div>
                                                        <div className="form-group">
                                                            <label>สารเคมี/สารออกฤทธิ์</label>
                                                            <input type="text" value={editVals.activeIngredient} onChange={(e) => setEditVals({...editVals, activeIngredient: e.target.value})} />
                                                        </div>
                                                        <div className="form-group">
                                                            <label>สรรพคุณ / ใช้รักษา-กำจัดอะไร</label>
                                                            <textarea value={editVals.usageInfo} onChange={(e) => setEditVals({...editVals, usageInfo: e.target.value})} rows="2"></textarea>
                                                        </div>
                                                        <div className="form-group">
                                                            <label>ข้อจำกัดการใช้</label>
                                                            <textarea value={editVals.restrictions} onChange={(e) => setEditVals({...editVals, restrictions: e.target.value})} rows="2"></textarea>
                                                        </div>
                                                        {isAdmin && (
                                                            <div className="grid-2">
                                                                <div className="form-group">
                                                                    <label>ราคาทุน</label>
                                                                    <input type="number" value={editVals.cost} onChange={(e) => setEditVals({...editVals, cost: e.target.value})} />
                                                                </div>
                                                                <div className="form-group">
                                                                    <label>ราคาส่ง</label>
                                                                    <input type="number" value={editVals.wholesalePrice} onChange={(e) => setEditVals({...editVals, wholesalePrice: e.target.value})} />
                                                                </div>
                                                            </div>
                                                        )}
                                                        </>)}
                                                        {locations.map(l => (
                                                            <div key={l.id} style={{border: '1px solid var(--border)', borderRadius: '10px', padding: '10px', marginBottom: '10px'}}>
                                                                <div className="form-group" style={{marginBottom: editMode === 'full' ? '10px' : 0}}>
                                                                    <label>จำนวนที่ 📍 {l.name}</label>

                                                                </div>
                                                                {editMode === 'full' && (
                                                                <div className="grid-2">

                                                                        <label>LOT (ถ้าเพิ่มจำนวน)</label>
                                                                        <input type="text" value={editVals.lotByLoc[l.id]} onChange={(e) => setEditVals({...editVals, lotByLoc: {...editVals.lotByLoc, [l.id]: e.target.value}})} />

                            </tbody>

                    </div>
                    <div style={{textAlign: 'center', margin: '15px 0', color: 'var(--text-muted)', fontSize: '13px'}}>
                        แสดง {filtered.length} จาก {allFiltered.length} รายการ
                        {allFiltered.length > filtered.length && (
                            <div style={{marginTop: '8px'}}>
                                <button className="secondary" onClick={() => setDisplayLimit(displayLimit + 50)}>โหลดเพิ่มเติม (+50)</button>
                                <button className="secondary" style={{marginLeft: '8px'}} onClick={() => setDisplayLimit(allFiltered.length)}>โหลดทั้งหมด</button>

        const UNASSIGNED = '__unassigned__';

        function BulkTransfer({ products, locations, stock, loadData, msg, msgType, flash, staffName }) {
            const [fromLoc, setFromLoc] = useState('');
            const [toLoc, setToLoc] = useState('');
            const [sel, setSel] = useState({});
            const [notes, setNotes] = useState('');
            const [search, setSearch] = useState('');
            const isUnassigned = fromLoc === UNASSIGNED;

            const stockedProductIds = new Set(stock.filter(s => parseFloat(s.quantity) > 0).map(s => s.product_id));
            const matchesSearch = (p) => !search || p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search);

            const rows = isUnassigned
                ? products.filter(p => !stockedProductIds.has(p.id)).filter(matchesSearch).slice(0, 100)
                    .map(p => ({ id: p.id, product_id: p.id, quantity: '', product: p }))
                : stock.filter(s => s.location_id === fromLoc && parseFloat(s.quantity) > 0)
                    .map(s => ({ ...s, product: products.find(p => p.id === s.product_id) }))
                    .filter(r => r.product && matchesSearch(r.product));

            const toggleAll = (checked) => {
                const next = {};
                if (checked) rows.forEach(r => { next[r.id] = { checked: true, qty: r.quantity }; });
                setSel(next);
            };

            const toggleRow = (r, checked) => {
                setSel({ ...sel, [r.id]: { checked, qty: sel[r.id]?.qty ?? r.quantity } });
            };

            const setQty = (r, qty) => {
                setSel({ ...sel, [r.id]: { checked: sel[r.id]?.checked ?? true, qty } });
            };

            const setPackQty = (r, packs) => {
                const packSize = parseFloat(r.product.pack_size) || 1;
                const subUnits = parseFloat(sel[r.id]?.subUnits) || 0;
                const qty = (parseFloat(packs) || 0) * packSize + subUnits;
                setSel({ ...sel, [r.id]: { checked: sel[r.id]?.checked ?? true, packs, subUnits: sel[r.id]?.subUnits ?? '', qty } });
            };

            const setSubQty = (r, subUnits) => {
                const packSize = parseFloat(r.product.pack_size) || 1;
                const packs = parseFloat(sel[r.id]?.packs) || 0;
                const qty = packs * packSize + (parseFloat(subUnits) || 0);
                setSel({ ...sel, [r.id]: { checked: sel[r.id]?.checked ?? true, packs: sel[r.id]?.packs ?? '', subUnits, qty } });
            };

            const handle = async () => {
                if (!fromLoc || !toLoc) { flash('เลือกต้นทางและปลายทาง'); return; }
                if (fromLoc === toLoc) { flash('ต้นทางและปลายทางต้องไม่ใช่ที่เดียวกัน'); return; }
                const chosen = rows.filter(r => sel[r.id]?.checked && parseFloat(sel[r.id]?.qty) > 0);
                if (chosen.length === 0) { flash('เลือกสินค้าอย่างน้อย 1 รายการ และระบุจำนวน'); return; }
                if (!isUnassigned) {
                    for (const r of chosen) {
                        if (parseFloat(sel[r.id].qty) > parseFloat(r.quantity)) { flash('จำนวนที่ย้ายของ ' + r.product.name + ' เกินจำนวนที่มี'); return; }
                    }
                }
                try {
                    for (const r of chosen) {
                        const q = parseFloat(sel[r.id].qty);
                        if (!isUnassigned) {
                            const remaining = parseFloat(r.quantity) - q;
                            await client.from('product_location_stock').update({ quantity: remaining, updated_at: new Date().toISOString() }).eq('id', r.id);
                        }
                        const dest = stock.find(s => s.product_id === r.product_id && s.location_id === toLoc);
                        if (dest) {
                            await client.from('product_location_stock').update({ quantity: parseFloat(dest.quantity) + q, updated_at: new Date().toISOString() }).eq('id', dest.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: r.product_id, location_id: toLoc, quantity: q }]);
                        }
                        if (isUnassigned) {
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: toLoc, quantity_change: q, movement_type: 'receiving', notes: notes || 'กำหนดคลังเริ่มต้น', staff_name: staffName }]);
                        } else {
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: fromLoc, quantity_change: -q, movement_type: 'transfer', notes, staff_name: staffName }]);
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: toLoc, quantity_change: q, movement_type: 'transfer', notes, staff_name: staffName }]);
                        }
                    }
                    flash('บันทึกสำเร็จ (' + chosen.length + ' รายการ)', 'success');
                    setSel({}); setNotes('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const selectedCount = Object.values(sel).filter(s => s.checked).length;

            return (
                <div>
                    <h2>ย้ายคลัง (หลายรายการ)</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ต้นทาง</label>
                            <select value={fromLoc} onChange={(e) => { setFromLoc(e.target.value); setSel({}); setSearch(''); }}>
                                <option value="">-- เลือก --</option>
                                <option value={UNASSIGNED}>ยังไม่ระบุคลัง</option>
                                {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>ปลายทาง</label>
                            <select value={toLoc} onChange={(e) => setToLoc(e.target.value)}>
                                <option value="">-- เลือก --</option>
                                {locations.filter(l => l.id !== fromLoc).map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                            </select>
                        </div>
                    </div>
                    {fromLoc && (
                        <div>
                            <div className="form-group">
                                <label>ค้นหาสินค้า</label>
                                <input type="text" placeholder="รหัส/ชื่อ" value={search} onChange={(e) => setSearch(e.target.value)} />
                            </div>
                            <div className="row-actions" style={{marginBottom: '10px'}}>
                                <button className="small secondary" onClick={() => toggleAll(true)}>เลือกทั้งหมด</button>
                                <button className="small secondary" onClick={() => toggleAll(false)}>ยกเลิกทั้งหมด</button>
                                <span style={{fontSize: '12px', color: '#666', alignSelf: 'center'}}>เลือกแล้ว {selectedCount} รายการ</span>
                            </div>
                            <table>
                                <thead><tr><th></th><th>สินค้า</th><th>คงเหลือ</th><th>จำนวนที่ย้าย</th></tr></thead>
                                <tbody>
                                    {rows.map(r => (
                                        <tr key={r.id}>
                                            <td><input type="checkbox" style={{width: 'auto'}} checked={!!sel[r.id]?.checked} onChange={(e) => toggleRow(r, e.target.checked)} /></td>
                                            <td>{r.product.product_code} - {r.product.name}</td>
                                            <td>{isUnassigned ? '-' : r.quantity + ' ' + (r.product.unit || '')} {!isUnassigned && formatUnit(r.product) !== (r.product.unit || '') ? '(' + formatUnit(r.product) + ')' : ''}</td>
                                            <td>
                                                {r.product.pack_unit && r.product.pack_size ? (
                                                    <div style={{display: 'flex', alignItems: 'center', gap: '6px', flexWrap: 'wrap'}}>
                                                        <input type="number" min="0" placeholder="0" value={sel[r.id]?.packs ?? ''} onChange={(e) => setPackQty(r, e.target.value)} style={{maxWidth: '70px'}} />
                                                        <span style={{fontSize: '12px', color: 'var(--text-muted)'}}>{r.product.pack_unit}</span>
                                                        <input type="number" min="0" placeholder="0" value={sel[r.id]?.subUnits ?? ''} onChange={(e) => setSubQty(r, e.target.value)} style={{maxWidth: '70px'}} />
                                                        <span style={{fontSize: '12px', color: 'var(--text-muted)'}}>{r.product.unit || ''}</span>
                                                        <span style={{fontSize: '11px', color: 'var(--text-muted)'}}>(= {sel[r.id]?.qty || 0} {r.product.unit})</span>
                                                    </div>
                                                ) : (
                                                    <div style={{display: 'flex', alignItems: 'center', gap: '6px'}}>
                                                        <input type="number" min="0" max={isUnassigned ? undefined : r.quantity} value={sel[r.id]?.qty ?? r.quantity} onChange={(e) => setQty(r, e.target.value)} style={{maxWidth: '90px'}} />
                                                        <span style={{fontSize: '12px', color: 'var(--text-muted)'}}>{r.product.unit || ''}</span>
                                                    </div>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {rows.length === 0 && <div style={{color: '#999', padding: '10px'}}>{isUnassigned ? 'ไม่พบสินค้าที่ยังไม่ระบุคลัง' : 'ที่อยู่นี้ไม่มีสต็อก'}</div>}
                            {isUnassigned && rows.length === 100 && <div style={{fontSize: '11px', color: '#999', marginTop: '5px'}}>แสดง 100 รายการแรก ใช้ช่องค้นหาเพื่อดูรายการอื่น</div>}
                        </div>
                    )}
                    <div className="form-group" style={{marginTop: '15px'}}>
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>
                    <button onClick={handle}>ยืนยันย้ายคลัง</button>
                </div>
            );
        }

        function ExpiryAlerts({ products, locations, lots }) {
            const [filter, setFilter] = useState('30');

            const rows = lots
                .map(l => ({ ...l, product: products.find(p => p.id === l.product_id), location: locations.find(x => x.id === l.location_id), days: l.expiry_date ? daysUntil(l.expiry_date) : null }))
                .filter(r => r.product && r.expiry_date)
                .filter(r => {
                    if (filter === 'all') return true;
                    if (filter === 'expired') return r.days < 0;
                    return r.days <= parseInt(filter);
                })
                .sort((a, b) => a.days - b.days);

            const statusOf = (days) => {
                if (days < 0) return { label: 'หมดอายุแล้ว', cls: 'badge-out' };
                if (days <= 7) return { label: 'อีก ' + days + ' วัน', cls: 'badge-out' };
                if (days <= 30) return { label: 'อีก ' + days + ' วัน', cls: 'badge-adj' };
                return { label: 'อีก ' + days + ' วัน', cls: 'badge-in' };
            };

            return (
                <div>
                    <h2>สินค้าใกล้หมดอายุ</h2>
                    <div className="form-group" style={{maxWidth: '250px'}}>
                        <label>ช่วงเวลา</label>
                        <select value={filter} onChange={(e) => setFilter(e.target.value)}>
                            <option value="7">ภายใน 7 วัน</option>
                            <option value="30">ภายใน 30 วัน</option>
                            <option value="90">ภายใน 90 วัน</option>
                            <option value="expired">หมดอายุแล้ว</option>
                            <option value="all">ทั้งหมด (ที่มี LOT)</option>
                        </select>
                    </div>
                    <table>
                        <thead><tr><th>สินค้า</th><th>ที่อยู่</th><th>LOT</th><th>วันหมดอายุ</th><th>จำนวน</th><th>สถานะ</th></tr></thead>
                        <tbody>
                            {rows.map(r => {
                                const s = statusOf(r.days);
                                return (
                                    <tr key={r.id}>
                                        <td>{r.product.product_code} - {r.product.name}</td>
                                        <td>{r.location ? r.location.name : '-'}</td>
                                        <td>{r.lot_number || '-'}</td>
                                        <td>{r.expiry_date}</td>
                                        <td>{r.quantity} {r.product.unit} {formatUnit(r.product) !== (r.product.unit || '') ? '(' + formatUnit(r.product) + ')' : ''}</td>
                                        <td><span className={'badge ' + s.cls}>{s.label}</span></td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {rows.length === 0 && <div style={{color: '#999', padding: '20px', textAlign: 'center'}}>ไม่มีรายการในช่วงที่เลือก</div>}
                </div>
            );
        }

        function History({ products, locations, movements }) {
            const [filterType, setFilterType] = useState('');
            const filtered = filterType ? movements.filter(m => m.movement_type === filterType) : movements;
            return (
                <div>
                    <h2>ประวัติการเข้าออก</h2>
                    <div className="form-group" style={{maxWidth: '250px'}}>
                        <label>กรองตามประเภท</label>
                        <select value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                            <option value="">ทั้งหมด</option>
                            <option value="receiving">รับเข้า</option>
                            <option value="sale">ขายหน้าร้าน</option>
                            <option value="transfer">โอนสาขา</option>
                            <option value="adjustment">ปรับปรุง</option>
                        </select>
                    </div>
                    <table>
                        <thead>
                            <tr><th>วันที่</th><th>สินค้า</th><th>ที่อยู่</th><th>ประเภท</th><th>จำนวนที่เปลี่ยน</th><th>พนักงาน</th><th>หมายเหตุ</th></tr>
                        </thead>
                        <tbody>
                            {filtered.map(m => {
                                const p = products.find(x => x.id === m.product_id);
                                const l = locations.find(x => x.id === m.location_id);
                                const isOut = parseFloat(m.quantity_change) < 0;
                                return (
                                    <tr key={m.id}>
                                        <td>{new Date(m.created_at).toLocaleString('th-TH')}</td>
                                        <td>{p ? p.product_code + ' - ' + p.name : '-'}</td>
                                        <td>{l ? l.name : '-'}</td>
                                        <td><span className={'badge ' + (m.movement_type === 'adjustment' ? 'badge-adj' : (isOut ? 'badge-out' : 'badge-in'))}>{MOVEMENT_LABELS[m.movement_type] || m.movement_type}</span></td>
                                        <td style={{color: isOut ? '#721c24' : '#155724', fontWeight: 'bold'}}>{isOut ? '' : '+'}{m.quantity_change}</td>
                                        <td>{m.staff_name || '-'}</td>
                                        <td>{m.notes || '-'}</td>
                                    </tr>
                                );
                            })}

        function App() {
            const [currentStaff, setCurrentStaff] = useState(() => {

            });
            const [tab, setTab] = useState('home');
            const [products, setProducts] = useState([]);
            const [locations, setLocations] = useState([]);
            const [stock, setStock] = useState([]);
            const [movements, setMovements] = useState([]);
            const [lots, setLots] = useState([]);
            const [staff, setStaff] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [tradeNames, setTradeNames] = useState([]);
            const [loading, setLoading] = useState(true);
            const [msg, setMsg] = useState('');
            const [msgType, setMsgType] = useState('error');
            const [receiveSeed, setReceiveSeed] = useState(null);

            useEffect(() => { loadData(); }, []);

            const goReceiveFromPo = (seed) => {
                setReceiveSeed(seed);
                setTab('receiving');
                setMsg('');
            };

            const flash = (text, type) => {
                setMsg(text);
                setMsgType(type || 'error');
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    let allProds = [];
                    for (let i = 0; i < 5; i++) {
                        const from = i * 1000;
                        const to = from + 999;
                        const res = await client.from('products').select('*').range(from, to);
                        if (res.data && res.data.length > 0) {
                            allProds = allProds.concat(res.data);
                        }
                        if (!res.data || res.data.length < 1000) break;
                    }
                    const [locRes, stockRes, movRes, lotRes, staffRes, supplierRes, tradeNameRes] = await Promise.all([
                        client.from('storage_locations').select('*'),
                        client.from('product_location_stock').select('*').limit(10000),
                        client.from('stock_movements').select('*').order('created_at', { ascending: false }).limit(300),
                        client.from('stock_lots').select('*').gt('quantity', 0).order('expiry_date', { ascending: true }).limit(2000),
                        client.from('staff').select('*').order('name'),
                        client.from('suppliers').select('*').order('name'),
                        client.from('supplier_trade_names').select('*').order('trade_name')
                    ]);
                    setProducts(allProds);
                    setLocations(locRes.data || []);
                    setStock(stockRes.data || []);
                    setMovements(movRes.data || []);
                    setLots(lotRes.data || []);
                    setStaff(staffRes.data || []);
                    setSuppliers(supplierRes.data || []);
                    setTradeNames(tradeNameRes.data || []);
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
                setLoading(false);
            };

            if (!currentStaff) return <Login onLogin={setCurrentStaff} />;
            if (loading) return <div className="container"><div className="loading">กำลังโหลด...</div></div>;

            const logout = () => {
                sessionStorage.removeItem('warehouse_staff');
                setCurrentStaff(null);
            };

            const shared = { products, locations, stock, movements, lots, staff, suppliers, tradeNames, loadData, msg, msgType, flash, staffName: currentStaff.name, isAdmin: currentStaff.is_admin, receiveSeed, clearReceiveSeed: () => setReceiveSeed(null), goReceiveFromPo };
            const soonCount = lots.filter(l => l.expiry_date && daysUntil(l.expiry_date) <= 30).length;

            return (
                <div className="container">
                    <div className="sidebar">
                        <div className="app-header">
                            <div className="logo-badge"><IconLogo /></div>
                            <div>
                                <h1>ระบบจัดการคลังสินค้า</h1>
                                <div className="app-subtitle">บริหารสต็อกแบบเรียลไทม์</div>
                            </div>
                        </div>
                        <div className="nav-tabs">
                            <button className={'nav-tab ' + (tab === 'home' ? 'active' : '')} onClick={() => { setTab('home'); setMsg(''); }}><IconHome />หน้าแรก</button>
                            <button className={'nav-tab ' + (tab === 'receiving' ? 'active' : '')} onClick={() => { setTab('receiving'); setMsg(''); }}><IconIn />รับเข้า</button>
                            <button className={'nav-tab ' + (tab === 'issue' ? 'active' : '')} onClick={() => { setTab('issue'); setMsg(''); }}><IconOut />เบิกออก</button>
                            <button className={'nav-tab ' + (tab === 'warehouse' ? 'active' : '')} onClick={() => { setTab('warehouse'); setMsg(''); }}><IconBox />คลังสินค้า</button>
                            <button className={'nav-tab ' + (tab === 'transfer' ? 'active' : '')} onClick={() => { setTab('transfer'); setMsg(''); }}><IconSwap />ย้ายคลัง</button>
                            <button className={'nav-tab ' + (tab === 'po' ? 'active' : '')} onClick={() => { setTab('po'); setMsg(''); }}><IconCart />สั่งซื้อ</button>
                            <button className={'nav-tab ' + (tab === 'expiry' ? 'active' : '')} onClick={() => { setTab('expiry'); setMsg(''); }}><IconAlert />ใกล้หมดอายุ{soonCount > 0 ? ' (' + soonCount + ')' : ''}</button>
                            <button className={'nav-tab ' + (tab === 'history' ? 'active' : '')} onClick={() => { setTab('history'); setMsg(''); }}><IconHistory />ประวัติ</button>
                            <button className={'nav-tab ' + (tab === 'locations' ? 'active' : '')} onClick={() => { setTab('locations'); setMsg(''); }}><IconPin />ที่อยู่</button>
                            <button className={'nav-tab ' + (tab === 'suppliers' ? 'active' : '')} onClick={() => { setTab('suppliers'); setMsg(''); }}><IconTruck />ผู้ผลิต</button>
                            {currentStaff.is_admin && <button className={'nav-tab ' + (tab === 'stats' ? 'active' : '')} onClick={() => { setTab('stats'); setMsg(''); }}><IconChart />สถิติสั่งซื้อ</button>}
                            {currentStaff.is_admin && <button className={'nav-tab ' + (tab === 'staff' ? 'active' : '')} onClick={() => { setTab('staff'); setMsg(''); }}><IconUser />พนักงาน</button>}
                        </div>
                        <div style={{marginTop: 'auto', paddingTop: '16px', borderTop: '1px solid var(--border)'}}>
                            <div style={{fontSize: '12px', color: 'var(--text-muted)', marginBottom: '8px', padding: '0 6px'}}>เข้าสู่ระบบ: <strong style={{color: 'var(--text)'}}>{currentStaff.name}</strong></div>
                            <button className="secondary small" style={{width: '100%'}} onClick={logout}>ออกจากระบบ</button>
                        </div>
                    </div>
                    <div className="main-content">
                        {tab === 'home' && <Home {...shared} />}
                        {tab === 'receiving' && <Receiving {...shared} />}
                        {tab === 'issue' && <IssueStock {...shared} />}
                        {tab === 'warehouse' && <Warehouse {...shared} />}
                        {tab === 'transfer' && <BulkTransfer {...shared} />}
                        {tab === 'po' && <PurchaseOrders {...shared} />}
                        {tab === 'expiry' && <ExpiryAlerts {...shared} />}
                        {tab === 'history' && <History {...shared} />}
                        {tab === 'locations' && <Locations {...shared} />}
                        {tab === 'suppliers' && <SupplierManagement {...shared} />}
                        {tab === 'stats' && currentStaff.is_admin && <PurchasingStats {...shared} />}
                        {tab === 'staff' && currentStaff.is_admin && <StaffManagement {...shared} />}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
