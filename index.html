<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคลังสินค้า</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; margin-bottom: 20px; }
        h2 { color: #333; margin: 20px 0 15px 0; font-size: 20px; }
        h3 { color: #333; font-size: 16px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .nav-tab { padding: 10px 20px; cursor: pointer; background: none; color: #333; border: none; border-bottom: 3px solid transparent; font-size: 14px; }
        .nav-tab.active { border-bottom-color: #007bff; color: #007bff; font-weight: bold; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #f9f9f9; padding: 15px; border-radius: 4px; text-align: center; border-left: 4px solid #007bff; }
        .stat-value { font-size: 28px; font-weight: bold; color: #007bff; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 8px; border: 2px solid #ddd; border-radius: 4px; background: white; color: #333; font-size: 14px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.danger { background: #dc3545; }
        button.small { padding: 6px 12px; font-size: 12px; }
        .alert { padding: 12px; margin-bottom: 15px; border-radius: 4px; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .loading { text-align: center; padding: 40px; color: #999; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f9f9f9; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; font-weight: bold; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card { padding: 12px; background: #f9f9f9; border-radius: 4px; margin-bottom: 15px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .badge-in { background: #d4edda; color: #155724; }
        .badge-out { background: #f8d7da; color: #721c24; }
        .badge-adj { background: #fff3cd; color: #856404; }
        .row-actions { display: flex; gap: 8px; margin-top: 10px; }
        .loc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .loc-tag { display: inline-block; background: #e9ecef; color: #333; padding: 3px 10px; border-radius: 12px; font-size: 11px; }
        .search-results { border: 1px solid #ddd; max-height: 150px; overflow-y: auto; }
        .search-result-item { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
        .search-result-item:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createClient } = supabase;
        const supabaseUrl = 'https://fimdhwhaabryezgramxa.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpbWRod2hhYWJyeWV6Z3JhbXhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzOTkxNDUsImV4cCI6MjA5ODk3NTE0NX0.eTkZCxDNKQbFCZmBIXjfprESFKUzDuEjaFokvueof6s';
        const client = createClient(supabaseUrl, supabaseKey);

        const MOVEMENT_LABELS = {
            receiving: 'รับเข้า',
            sale: 'ขายหน้าร้าน',
            transfer: 'โอนสาขา',
            adjustment: 'ปรับปรุง'
        };

        const daysUntil = (dateStr) => {
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr + 'T00:00:00');
            return Math.round((target - today) / 86400000);
        };

        function Home({ products, locations, stock, movements }) {
            const total = stock.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
            return (
                <div>
                    <div className="stats">
                        <div className="stat-box"><div className="stat-value">{products.length}</div><div className="stat-label">สินค้า</div></div>
                        <div className="stat-box"><div className="stat-value">{locations.length}</div><div className="stat-label">ที่อยู่</div></div>
                        <div className="stat-box"><div className="stat-value">{total.toFixed(0)}</div><div className="stat-label">จำนวน</div></div>
                        <div className="stat-box"><div className="stat-value">{new Set(stock.map(s => s.location_id)).size}</div><div className="stat-label">ใช้งาน</div></div>
                    </div>
                    <h2>รายการล่าสุด</h2>
                    {movements.slice(0, 10).map(m => {
                        const p = products.find(x => x.id === m.product_id);
                        const l = locations.find(x => x.id === m.location_id);
                        const isOut = parseFloat(m.quantity_change) < 0;
                        return (
                            <div key={m.id} className="card" style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                <div>
                                    <span className={'badge ' + (m.movement_type === 'adjustment' ? 'badge-adj' : (isOut ? 'badge-out' : 'badge-in'))}>{MOVEMENT_LABELS[m.movement_type] || m.movement_type}</span>
                                    <strong style={{marginLeft: '8px'}}>{p ? p.product_code + ' - ' + p.name : '-'}</strong>
                                    <div style={{fontSize: '12px', color: '#666'}}>📍 {l ? l.name : '-'}</div>
                                </div>
                                <div style={{textAlign: 'right'}}>
                                    <div style={{fontWeight: 'bold', color: isOut ? '#721c24' : '#155724'}}>{isOut ? '' : '+'}{m.quantity_change}</div>
                                    <div style={{fontSize: '11px', color: '#999'}}>{new Date(m.created_at).toLocaleString('th-TH')}</div>
                                </div>
                            </div>
                        );
                    })}
                    {movements.length === 0 && <div style={{color: '#999'}}>ยังไม่มีรายการ</div>}
                </div>
            );
        }

        function Receiving({ products, locations, stock, loadData, msg, msgType, flash }) {
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [search, setSearch] = useState('');
            const [notes, setNotes] = useState('');
            const [rows, setRows] = useState([{ lid: '', qty: '', lot: '', expiry: '' }]);
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const product = products.find(p => p.id === pid);

            const setRow = (i, patch) => setRows(rows.map((r, idx) => idx === i ? { ...r, ...patch } : r));
            const addRow = () => setRows([...rows, { lid: '', qty: '', lot: '', expiry: '' }]);
            const removeRow = (i) => setRows(rows.filter((_, idx) => idx !== i));

            const handle = async () => {
                const validRows = rows.filter(r => r.lid && r.qty && parseFloat(r.qty) > 0);
                if (!pid || validRows.length === 0) { flash('เลือกสินค้าและกรอกที่อยู่กับจำนวนอย่างน้อย 1 แถว'); return; }
                try {
                    const runningQty = {};
                    const rowIdByLoc = {};
                    for (const r of validRows) {
                        const q = parseFloat(r.qty);
                        await client.from('receiving_logs').insert([{ product_id: pid, location_id: r.lid, quantity: q, notes }]);
                        if (!(r.lid in runningQty)) {
                            const s = stock.find(x => x.product_id === pid && x.location_id === r.lid);
                            runningQty[r.lid] = s ? parseFloat(s.quantity) : 0;
                            if (s) rowIdByLoc[r.lid] = s.id;
                        }
                        runningQty[r.lid] += q;
                        if (rowIdByLoc[r.lid]) {
                            await client.from('product_location_stock').update({ quantity: runningQty[r.lid], updated_at: new Date().toISOString() }).eq('id', rowIdByLoc[r.lid]);
                        } else {
                            const { data } = await client.from('product_location_stock').insert([{ product_id: pid, location_id: r.lid, quantity: runningQty[r.lid] }]).select('id');
                            if (data && data[0]) rowIdByLoc[r.lid] = data[0].id;
                        }
                        await client.from('stock_movements').insert([{ product_id: pid, location_id: r.lid, quantity_change: q, movement_type: 'receiving', notes }]);
                        if (r.lot || r.expiry) {
                            await client.from('stock_lots').insert([{ product_id: pid, location_id: r.lid, lot_number: r.lot || null, expiry_date: r.expiry || null, quantity: q, notes }]);
                        }
                    }
                    flash('บันทึกรับเข้าสำเร็จ', 'success');
                    setPid(''); setPLabel(''); setSearch(''); setNotes(''); setRows([{ lid: '', qty: '', lot: '', expiry: '' }]);
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>รับเข้าสินค้า</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="form-group">
                        <label>ค้นหาสินค้า</label>
                        <input type="text" placeholder="รหัส/ชื่อ" value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); }} />
                        {search && !pid && (<div className="search-results">
                            {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name} {p.unit ? '(' + p.unit + ')' : ''}</div>))}
                        </div>)}
                        {product && <div style={{fontSize: '12px', color: '#666', marginTop: '5px'}}>หน่วย: {product.unit || '-'}</div>}
                    </div>
                    {rows.map((r, i) => (
                        <div key={i} style={{border: '1px solid #eee', borderRadius: '4px', padding: '10px', marginBottom: '10px'}}>
                            <div className="grid-3" style={{alignItems: 'end'}}>
                                <div className="form-group">
                                    <label>ที่อยู่คลัง</label>
                                    <select value={r.lid} onChange={(e) => setRow(i, { lid: e.target.value })}>
                                        <option value="">-- เลือก --</option>
                                        {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>จำนวน{product?.unit ? ' (' + product.unit + ')' : ''}</label>
                                    <input type="number" min="1" value={r.qty} onChange={(e) => setRow(i, { qty: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    {rows.length > 1 && <button className="secondary" onClick={() => removeRow(i)}>ลบแถว</button>}
                                </div>
                            </div>
                            <div className="grid-2">
                                <div className="form-group">
                                    <label>LOT (ถ้ามี)</label>
                                    <input type="text" value={r.lot} onChange={(e) => setRow(i, { lot: e.target.value })} />
                                </div>
                                <div className="form-group">
                                    <label>วันหมดอายุ (ถ้ามี)</label>
                                    <input type="date" value={r.expiry} onChange={(e) => setRow(i, { expiry: e.target.value })} />
                                </div>
                            </div>
                        </div>
                    ))}
                    <button className="secondary small" onClick={addRow} style={{marginBottom: '15px'}}>+ เพิ่มที่อยู่</button>
                    <div className="form-group">
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>
                    <button onClick={handle}>บันทึกรับเข้า</button>
                </div>
            );
        }

        function IssueStock({ products, locations, stock, loadData, msg, msgType, flash }) {
            const [pid, setPid] = useState('');
            const [pLabel, setPLabel] = useState('');
            const [lid, setLid] = useState('');
            const [qty, setQty] = useState('');
            const [issueType, setIssueType] = useState('sale');
            const [notes, setNotes] = useState('');
            const [search, setSearch] = useState('');
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 20);
            const availableLocs = stock.filter(s => s.product_id === pid && parseFloat(s.quantity) > 0);
            const current = stock.find(x => x.product_id === pid && x.location_id === lid);

            const handle = async () => {
                if (!pid || !lid || !qty || parseFloat(qty) <= 0) { flash('กรอกข้อมูลให้ครบและจำนวนต้องมากกว่า 0'); return; }
                const q = parseFloat(qty);
                const s = stock.find(x => x.product_id === pid && x.location_id === lid);
                const avail = s ? parseFloat(s.quantity) : 0;
                if (q > avail) { flash('สต็อกไม่พอ (คงเหลือ ' + avail + ')'); return; }
                try {
                    await client.from('product_location_stock').update({ quantity: avail - q, updated_at: new Date().toISOString() }).eq('id', s.id);
                    await client.from('stock_movements').insert([{ product_id: pid, location_id: lid, quantity_change: -q, movement_type: issueType, notes }]);
                    flash('บันทึกเบิกออกสำเร็จ', 'success');
                    setPid(''); setPLabel(''); setLid(''); setQty(''); setSearch(''); setNotes('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>เบิกสินค้าออก</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ค้นหาสินค้า</label>
                            <input type="text" placeholder="รหัส/ชื่อ" value={pLabel || search} onChange={(e) => { setSearch(e.target.value); setPLabel(''); setPid(''); setLid(''); }} />
                            {search && !pid && (<div className="search-results">
                                {filtered.map(p => (<div key={p.id} className="search-result-item" onClick={() => { setPid(p.id); setPLabel(p.product_code + ' - ' + p.name); setSearch(''); }}>{p.product_code} - {p.name}</div>))}
                            </div>)}
                        </div>
                        <div className="form-group">
                            <label>ที่อยู่คลัง (มีสต็อก)</label>
                            <select value={lid} onChange={(e) => setLid(e.target.value)} disabled={!pid}>
                                <option value="">-- เลือก --</option>
                                {availableLocs.map(s => {
                                    const l = locations.find(x => x.id === s.location_id);
                                    return (<option key={s.id} value={s.location_id}>{l ? l.name : '-'} (คงเหลือ {s.quantity})</option>);
                                })}
                            </select>
                        </div>
                    </div>
                    <div className="grid-3">
                        <div className="form-group">
                            <label>จำนวน{current ? ' (คงเหลือ ' + current.quantity + ')' : ''}</label>
                            <input type="number" min="1" value={qty} onChange={(e) => setQty(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>ประเภทการเบิก</label>
                            <select value={issueType} onChange={(e) => setIssueType(e.target.value)}>
                                <option value="sale">ขายหน้าร้าน</option>
                                <option value="transfer">โอนสาขาย่อย</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label>หมายเหตุ{issueType === 'transfer' ? ' (ระบุสาขาปลายทาง)' : ''}</label>
                            <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={handle}>บันทึกเบิกออก</button>
                </div>
            );
        }

        function Warehouse({ products, locations, stock, loadData, msg, msgType, flash }) {
            const [search, setSearch] = useState('');
            const [editId, setEditId] = useState(null);
            const [editVals, setEditVals] = useState({});
            const filtered = products.filter(p => p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search)).slice(0, 50);

            const startEdit = (p) => {
                const ps = stock.filter(s => s.product_id === p.id);
                const qtyByLoc = {};
                locations.forEach(l => { const s = ps.find(x => x.location_id === l.id); qtyByLoc[l.id] = s ? s.quantity : 0; });
                setEditId(p.id);
                setEditVals({ name: p.name, unit: p.unit || '', price: p.price || '', qtyByLoc });
            };

            const cancelEdit = () => { setEditId(null); setEditVals({}); };

            const saveEdit = async (p) => {
                try {
                    await client.from('products').update({ name: editVals.name, unit: editVals.unit, price: editVals.price === '' ? null : parseFloat(editVals.price) }).eq('id', p.id);
                    const ps = stock.filter(s => s.product_id === p.id);
                    for (const l of locations) {
                        const s = ps.find(x => x.location_id === l.id);
                        const newQty = parseFloat(editVals.qtyByLoc[l.id]);
                        const oldQty = s ? parseFloat(s.quantity) : 0;
                        if (isNaN(newQty) || newQty === oldQty) continue;
                        if (s) {
                            await client.from('product_location_stock').update({ quantity: newQty, updated_at: new Date().toISOString() }).eq('id', s.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: p.id, location_id: l.id, quantity: newQty }]);
                        }
                        await client.from('stock_movements').insert([{ product_id: p.id, location_id: l.id, quantity_change: newQty - oldQty, movement_type: 'adjustment', notes: 'แก้ไขจากหน้าคลังสินค้า' }]);
                    }
                    flash('บันทึกการแก้ไขสำเร็จ', 'success');
                    cancelEdit();
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            return (
                <div>
                    <h2>คลังสินค้า</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <input type="text" placeholder="ค้นหา..." value={search} onChange={(e) => setSearch(e.target.value)} style={{marginBottom: '15px'}} />
                    {filtered.map(p => {
                        const ps = stock.filter(s => s.product_id === p.id);
                        const tot = ps.reduce((s, x) => s + (parseFloat(x.quantity) || 0), 0);
                        const isEditing = editId === p.id;
                        return (
                            <div key={p.id} className="card">
                                {!isEditing && (
                                    <div>
                                        <div style={{display: 'flex', justifyContent: 'space-between'}}>
                                            <div>
                                                <strong>{p.product_code}</strong> - {p.name}
                                                <div style={{fontSize: '12px', color: '#666', marginTop: '5px'}}>รวม: {tot.toFixed(0)} {p.unit} {p.price ? '· ราคา ' + p.price + ' บาท' : ''}</div>
                                            </div>
                                            <button className="small secondary" onClick={() => startEdit(p)}>แก้ไข</button>
                                        </div>
                                        <div className="loc-tags">
                                            {ps.filter(s => parseFloat(s.quantity) > 0).map(s => {
                                                const l = locations.find(x => x.id === s.location_id);
                                                return (<span key={s.id} className="loc-tag">📍 {l ? l.name : '-'}: {s.quantity}</span>);
                                            })}
                                            {ps.filter(s => parseFloat(s.quantity) > 0).length === 0 && <span style={{fontSize: '11px', color: '#999'}}>ยังไม่มีสต็อก</span>}
                                        </div>
                                    </div>
                                )}
                                {isEditing && (
                                    <div>
                                        <div className="grid-3">
                                            <div className="form-group">
                                                <label>ชื่อ</label>
                                                <input type="text" value={editVals.name} onChange={(e) => setEditVals({...editVals, name: e.target.value})} />
                                            </div>
                                            <div className="form-group">
                                                <label>หน่วย</label>
                                                <input type="text" value={editVals.unit} onChange={(e) => setEditVals({...editVals, unit: e.target.value})} />
                                            </div>
                                            <div className="form-group">
                                                <label>ราคา</label>
                                                <input type="number" value={editVals.price} onChange={(e) => setEditVals({...editVals, price: e.target.value})} />
                                            </div>
                                        </div>
                                        {locations.map(l => (
                                            <div className="form-group" key={l.id}>
                                                <label>จำนวนที่ 📍 {l.name}</label>
                                                <input type="number" value={editVals.qtyByLoc[l.id]} onChange={(e) => setEditVals({...editVals, qtyByLoc: {...editVals.qtyByLoc, [l.id]: e.target.value}})} />
                                            </div>
                                        ))}
                                        <div className="row-actions">
                                            <button onClick={() => saveEdit(p)}>บันทึก</button>
                                            <button className="secondary" onClick={cancelEdit}>ยกเลิก</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        const UNASSIGNED = '__unassigned__';

        function BulkTransfer({ products, locations, stock, loadData, msg, msgType, flash }) {
            const [fromLoc, setFromLoc] = useState('');
            const [toLoc, setToLoc] = useState('');
            const [sel, setSel] = useState({});
            const [notes, setNotes] = useState('');
            const [search, setSearch] = useState('');
            const isUnassigned = fromLoc === UNASSIGNED;

            const stockedProductIds = new Set(stock.filter(s => parseFloat(s.quantity) > 0).map(s => s.product_id));
            const matchesSearch = (p) => !search || p.product_code?.includes(search.toUpperCase()) || p.name?.includes(search);

            const rows = isUnassigned
                ? products.filter(p => !stockedProductIds.has(p.id)).filter(matchesSearch).slice(0, 100)
                    .map(p => ({ id: p.id, product_id: p.id, quantity: '', product: p }))
                : stock.filter(s => s.location_id === fromLoc && parseFloat(s.quantity) > 0)
                    .map(s => ({ ...s, product: products.find(p => p.id === s.product_id) }))
                    .filter(r => r.product && matchesSearch(r.product));

            const toggleAll = (checked) => {
                const next = {};
                if (checked) rows.forEach(r => { next[r.id] = { checked: true, qty: r.quantity }; });
                setSel(next);
            };

            const toggleRow = (r, checked) => {
                setSel({ ...sel, [r.id]: { checked, qty: sel[r.id]?.qty ?? r.quantity } });
            };

            const setQty = (r, qty) => {
                setSel({ ...sel, [r.id]: { checked: sel[r.id]?.checked ?? true, qty } });
            };

            const handle = async () => {
                if (!fromLoc || !toLoc) { flash('เลือกต้นทางและปลายทาง'); return; }
                if (fromLoc === toLoc) { flash('ต้นทางและปลายทางต้องไม่ใช่ที่เดียวกัน'); return; }
                const chosen = rows.filter(r => sel[r.id]?.checked && parseFloat(sel[r.id]?.qty) > 0);
                if (chosen.length === 0) { flash('เลือกสินค้าอย่างน้อย 1 รายการ และระบุจำนวน'); return; }
                if (!isUnassigned) {
                    for (const r of chosen) {
                        if (parseFloat(sel[r.id].qty) > parseFloat(r.quantity)) { flash('จำนวนที่ย้ายของ ' + r.product.name + ' เกินจำนวนที่มี'); return; }
                    }
                }
                try {
                    for (const r of chosen) {
                        const q = parseFloat(sel[r.id].qty);
                        if (!isUnassigned) {
                            const remaining = parseFloat(r.quantity) - q;
                            await client.from('product_location_stock').update({ quantity: remaining, updated_at: new Date().toISOString() }).eq('id', r.id);
                        }
                        const dest = stock.find(s => s.product_id === r.product_id && s.location_id === toLoc);
                        if (dest) {
                            await client.from('product_location_stock').update({ quantity: parseFloat(dest.quantity) + q, updated_at: new Date().toISOString() }).eq('id', dest.id);
                        } else {
                            await client.from('product_location_stock').insert([{ product_id: r.product_id, location_id: toLoc, quantity: q }]);
                        }
                        if (isUnassigned) {
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: toLoc, quantity_change: q, movement_type: 'receiving', notes: notes || 'กำหนดคลังเริ่มต้น' }]);
                        } else {
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: fromLoc, quantity_change: -q, movement_type: 'transfer', notes }]);
                            await client.from('stock_movements').insert([{ product_id: r.product_id, location_id: toLoc, quantity_change: q, movement_type: 'transfer', notes }]);
                        }
                    }
                    flash('บันทึกสำเร็จ (' + chosen.length + ' รายการ)', 'success');
                    setSel({}); setNotes('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const selectedCount = Object.values(sel).filter(s => s.checked).length;

            return (
                <div>
                    <h2>ย้ายคลัง (หลายรายการ)</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ต้นทาง</label>
                            <select value={fromLoc} onChange={(e) => { setFromLoc(e.target.value); setSel({}); setSearch(''); }}>
                                <option value="">-- เลือก --</option>
                                <option value={UNASSIGNED}>ยังไม่ระบุคลัง</option>
                                {locations.map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>ปลายทาง</label>
                            <select value={toLoc} onChange={(e) => setToLoc(e.target.value)}>
                                <option value="">-- เลือก --</option>
                                {locations.filter(l => l.id !== fromLoc).map(l => (<option key={l.id} value={l.id}>{l.name}</option>))}
                            </select>
                        </div>
                    </div>
                    {fromLoc && (
                        <div>
                            <div className="form-group">
                                <label>ค้นหาสินค้า</label>
                                <input type="text" placeholder="รหัส/ชื่อ" value={search} onChange={(e) => setSearch(e.target.value)} />
                            </div>
                            <div className="row-actions" style={{marginBottom: '10px'}}>
                                <button className="small secondary" onClick={() => toggleAll(true)}>เลือกทั้งหมด</button>
                                <button className="small secondary" onClick={() => toggleAll(false)}>ยกเลิกทั้งหมด</button>
                                <span style={{fontSize: '12px', color: '#666', alignSelf: 'center'}}>เลือกแล้ว {selectedCount} รายการ</span>
                            </div>
                            <table>
                                <thead><tr><th></th><th>สินค้า</th><th>คงเหลือ</th><th>จำนวนที่ย้าย</th></tr></thead>
                                <tbody>
                                    {rows.map(r => (
                                        <tr key={r.id}>
                                            <td><input type="checkbox" style={{width: 'auto'}} checked={!!sel[r.id]?.checked} onChange={(e) => toggleRow(r, e.target.checked)} /></td>
                                            <td>{r.product.product_code} - {r.product.name}</td>
                                            <td>{isUnassigned ? '-' : r.quantity + ' ' + (r.product.unit || '')}</td>
                                            <td><input type="number" min="0" max={isUnassigned ? undefined : r.quantity} value={sel[r.id]?.qty ?? r.quantity} onChange={(e) => setQty(r, e.target.value)} disabled={!sel[r.id]?.checked} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {rows.length === 0 && <div style={{color: '#999', padding: '10px'}}>{isUnassigned ? 'ไม่พบสินค้าที่ยังไม่ระบุคลัง' : 'ที่อยู่นี้ไม่มีสต็อก'}</div>}
                            {isUnassigned && rows.length === 100 && <div style={{fontSize: '11px', color: '#999', marginTop: '5px'}}>แสดง 100 รายการแรก ใช้ช่องค้นหาเพื่อดูรายการอื่น</div>}
                        </div>
                    )}
                    <div className="form-group" style={{marginTop: '15px'}}>
                        <label>หมายเหตุ</label>
                        <input type="text" value={notes} onChange={(e) => setNotes(e.target.value)} />
                    </div>
                    <button onClick={handle}>ยืนยันย้ายคลัง</button>
                </div>
            );
        }

        function ExpiryAlerts({ products, locations, lots }) {
            const [filter, setFilter] = useState('30');

            const rows = lots
                .map(l => ({ ...l, product: products.find(p => p.id === l.product_id), location: locations.find(x => x.id === l.location_id), days: l.expiry_date ? daysUntil(l.expiry_date) : null }))
                .filter(r => r.product && r.expiry_date)
                .filter(r => {
                    if (filter === 'all') return true;
                    if (filter === 'expired') return r.days < 0;
                    return r.days <= parseInt(filter);
                })
                .sort((a, b) => a.days - b.days);

            const statusOf = (days) => {
                if (days < 0) return { label: 'หมดอายุแล้ว', cls: 'badge-out' };
                if (days <= 7) return { label: 'อีก ' + days + ' วัน', cls: 'badge-out' };
                if (days <= 30) return { label: 'อีก ' + days + ' วัน', cls: 'badge-adj' };
                return { label: 'อีก ' + days + ' วัน', cls: 'badge-in' };
            };

            return (
                <div>
                    <h2>สินค้าใกล้หมดอายุ</h2>
                    <div className="form-group" style={{maxWidth: '250px'}}>
                        <label>ช่วงเวลา</label>
                        <select value={filter} onChange={(e) => setFilter(e.target.value)}>
                            <option value="7">ภายใน 7 วัน</option>
                            <option value="30">ภายใน 30 วัน</option>
                            <option value="90">ภายใน 90 วัน</option>
                            <option value="expired">หมดอายุแล้ว</option>
                            <option value="all">ทั้งหมด (ที่มี LOT)</option>
                        </select>
                    </div>
                    <table>
                        <thead><tr><th>สินค้า</th><th>ที่อยู่</th><th>LOT</th><th>วันหมดอายุ</th><th>จำนวน</th><th>สถานะ</th></tr></thead>
                        <tbody>
                            {rows.map(r => {
                                const s = statusOf(r.days);
                                return (
                                    <tr key={r.id}>
                                        <td>{r.product.product_code} - {r.product.name}</td>
                                        <td>{r.location ? r.location.name : '-'}</td>
                                        <td>{r.lot_number || '-'}</td>
                                        <td>{r.expiry_date}</td>
                                        <td>{r.quantity} {r.product.unit}</td>
                                        <td><span className={'badge ' + s.cls}>{s.label}</span></td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {rows.length === 0 && <div style={{color: '#999', padding: '20px', textAlign: 'center'}}>ไม่มีรายการในช่วงที่เลือก</div>}
                </div>
            );
        }

        function History({ products, locations, movements }) {
            const [filterType, setFilterType] = useState('');
            const filtered = filterType ? movements.filter(m => m.movement_type === filterType) : movements;
            return (
                <div>
                    <h2>ประวัติการเข้าออก</h2>
                    <div className="form-group" style={{maxWidth: '250px'}}>
                        <label>กรองตามประเภท</label>
                        <select value={filterType} onChange={(e) => setFilterType(e.target.value)}>
                            <option value="">ทั้งหมด</option>
                            <option value="receiving">รับเข้า</option>
                            <option value="sale">ขายหน้าร้าน</option>
                            <option value="transfer">โอนสาขา</option>
                            <option value="adjustment">ปรับปรุง</option>
                        </select>
                    </div>
                    <table>
                        <thead>
                            <tr><th>วันที่</th><th>สินค้า</th><th>ที่อยู่</th><th>ประเภท</th><th>จำนวนที่เปลี่ยน</th><th>หมายเหตุ</th></tr>
                        </thead>
                        <tbody>
                            {filtered.map(m => {
                                const p = products.find(x => x.id === m.product_id);
                                const l = locations.find(x => x.id === m.location_id);
                                const isOut = parseFloat(m.quantity_change) < 0;
                                return (
                                    <tr key={m.id}>
                                        <td>{new Date(m.created_at).toLocaleString('th-TH')}</td>
                                        <td>{p ? p.product_code + ' - ' + p.name : '-'}</td>
                                        <td>{l ? l.name : '-'}</td>
                                        <td><span className={'badge ' + (m.movement_type === 'adjustment' ? 'badge-adj' : (isOut ? 'badge-out' : 'badge-in'))}>{MOVEMENT_LABELS[m.movement_type] || m.movement_type}</span></td>
                                        <td style={{color: isOut ? '#721c24' : '#155724', fontWeight: 'bold'}}>{isOut ? '' : '+'}{m.quantity_change}</td>
                                        <td>{m.notes || '-'}</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {filtered.length === 0 && <div style={{color: '#999', padding: '20px', textAlign: 'center'}}>ไม่มีรายการ</div>}
                </div>
            );
        }

        function Locations({ locations, loadData, msg, msgType, flash }) {
            const [name, setName] = useState('');
            const [addr, setAddr] = useState('');
            const [editId, setEditId] = useState(null);
            const [editVals, setEditVals] = useState({ name: '', address: '' });

            const add = async () => {
                if (!name.trim()) { flash('ระบุชื่อ'); return; }
                try {
                    await client.from('storage_locations').insert([{ name, address: addr }]);
                    flash('เพิ่มสำเร็จ', 'success');
                    setName(''); setAddr('');
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const startEdit = (l) => { setEditId(l.id); setEditVals({ name: l.name, address: l.address || '' }); };
            const cancelEdit = () => { setEditId(null); setEditVals({ name: '', address: '' }); };

            const saveEdit = async (l) => {
                if (!editVals.name.trim()) { flash('ระบุชื่อ'); return; }
                try {
                    await client.from('storage_locations').update({ name: editVals.name, address: editVals.address }).eq('id', l.id);
                    flash('บันทึกสำเร็จ', 'success');
                    cancelEdit();
                    await loadData();
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
            };

            const remove = async (l) => {
                if (!confirm('ลบที่อยู่ "' + l.name + '" ใช่หรือไม่?')) return;
                try {
                    const { error } = await client.from('storage_locations').delete().eq('id', l.id);
                    if (error) throw error;
                    flash('ลบสำเร็จ', 'success');
                    await loadData();
                } catch (err) {
                    flash('ลบไม่ได้ เนื่องจากที่อยู่นี้มีข้อมูลสต็อกหรือประวัติผูกอยู่', 'error');
                }
            };

            return (
                <div>
                    <h2>จัดการที่อยู่</h2>
                    {msg && <div className={'alert alert-' + msgType}>{msg}</div>}
                    <div className="grid-2">
                        <div className="form-group">
                            <label>ชื่อที่อยู่</label>
                            <input type="text" value={name} onChange={(e) => setName(e.target.value)} />
                        </div>
                        <div className="form-group">
                            <label>ที่อยู่</label>
                            <input type="text" value={addr} onChange={(e) => setAddr(e.target.value)} />
                        </div>
                    </div>
                    <button onClick={add}>เพิ่มที่อยู่</button>
                    <h3 style={{marginTop: '25px'}}>ที่อยู่ทั้งหมด</h3>
                    {locations.map(l => (
                        <div key={l.id} className="card">
                            {editId === l.id ? (
                                <div>
                                    <div className="grid-2">
                                        <div className="form-group">
                                            <label>ชื่อที่อยู่</label>
                                            <input type="text" value={editVals.name} onChange={(e) => setEditVals({...editVals, name: e.target.value})} />
                                        </div>
                                        <div className="form-group">
                                            <label>ที่อยู่</label>
                                            <input type="text" value={editVals.address} onChange={(e) => setEditVals({...editVals, address: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="row-actions">
                                        <button onClick={() => saveEdit(l)}>บันทึก</button>
                                        <button className="secondary" onClick={cancelEdit}>ยกเลิก</button>
                                    </div>
                                </div>
                            ) : (
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                    <div>
                                        <strong>{l.name}</strong>
                                        <div style={{fontSize: '12px', color: '#666'}}>{l.address}</div>
                                    </div>
                                    <div className="row-actions">
                                        <button className="small secondary" onClick={() => startEdit(l)}>แก้ไข</button>
                                        <button className="small danger" onClick={() => remove(l)}>ลบ</button>
                                    </div>
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [tab, setTab] = useState('home');
            const [products, setProducts] = useState([]);
            const [locations, setLocations] = useState([]);
            const [stock, setStock] = useState([]);
            const [movements, setMovements] = useState([]);
            const [lots, setLots] = useState([]);
            const [loading, setLoading] = useState(true);
            const [msg, setMsg] = useState('');
            const [msgType, setMsgType] = useState('error');

            useEffect(() => { loadData(); }, []);

            const flash = (text, type) => {
                setMsg(text);
                setMsgType(type || 'error');
            };

            const loadData = async () => {
                setLoading(true);
                try {
                    let allProds = [];
                    for (let i = 0; i < 5; i++) {
                        const from = i * 1000;
                        const to = from + 999;
                        const res = await client.from('products').select('*').range(from, to);
                        if (res.data && res.data.length > 0) {
                            allProds = allProds.concat(res.data);
                        }
                        if (!res.data || res.data.length < 1000) break;
                    }
                    const [locRes, stockRes, movRes, lotRes] = await Promise.all([
                        client.from('storage_locations').select('*'),
                        client.from('product_location_stock').select('*').limit(10000),
                        client.from('stock_movements').select('*').order('created_at', { ascending: false }).limit(300),
                        client.from('stock_lots').select('*').gt('quantity', 0).order('expiry_date', { ascending: true }).limit(2000)
                    ]);
                    setProducts(allProds);
                    setLocations(locRes.data || []);
                    setStock(stockRes.data || []);
                    setMovements(movRes.data || []);
                    setLots(lotRes.data || []);
                } catch (err) {
                    flash('Error: ' + err.message, 'error');
                }
                setLoading(false);
            };

            if (loading) return <div className="container"><div className="loading">กำลังโหลด...</div></div>;

            const shared = { products, locations, stock, movements, lots, loadData, msg, msgType, flash };
            const soonCount = lots.filter(l => l.expiry_date && daysUntil(l.expiry_date) <= 30).length;

            return (
                <div className="container">
                    <h1>🏭 ระบบจัดการคลังสินค้า</h1>
                    <div className="nav-tabs">
                        <button className={'nav-tab ' + (tab === 'home' ? 'active' : '')} onClick={() => { setTab('home'); setMsg(''); }}>หน้าแรก</button>
                        <button className={'nav-tab ' + (tab === 'receiving' ? 'active' : '')} onClick={() => { setTab('receiving'); setMsg(''); }}>รับเข้า</button>
                        <button className={'nav-tab ' + (tab === 'issue' ? 'active' : '')} onClick={() => { setTab('issue'); setMsg(''); }}>เบิกออก</button>
                        <button className={'nav-tab ' + (tab === 'warehouse' ? 'active' : '')} onClick={() => { setTab('warehouse'); setMsg(''); }}>คลังสินค้า</button>
                        <button className={'nav-tab ' + (tab === 'transfer' ? 'active' : '')} onClick={() => { setTab('transfer'); setMsg(''); }}>ย้ายคลัง</button>
                        <button className={'nav-tab ' + (tab === 'expiry' ? 'active' : '')} onClick={() => { setTab('expiry'); setMsg(''); }}>ใกล้หมดอายุ{soonCount > 0 ? ' (' + soonCount + ')' : ''}</button>
                        <button className={'nav-tab ' + (tab === 'history' ? 'active' : '')} onClick={() => { setTab('history'); setMsg(''); }}>ประวัติ</button>
                        <button className={'nav-tab ' + (tab === 'locations' ? 'active' : '')} onClick={() => { setTab('locations'); setMsg(''); }}>ที่อยู่</button>
                    </div>
                    {tab === 'home' && <Home {...shared} />}
                    {tab === 'receiving' && <Receiving {...shared} />}
                    {tab === 'issue' && <IssueStock {...shared} />}
                    {tab === 'warehouse' && <Warehouse {...shared} />}
                    {tab === 'transfer' && <BulkTransfer {...shared} />}
                    {tab === 'expiry' && <ExpiryAlerts {...shared} />}
                    {tab === 'history' && <History {...shared} />}
                    {tab === 'locations' && <Locations {...shared} />}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
